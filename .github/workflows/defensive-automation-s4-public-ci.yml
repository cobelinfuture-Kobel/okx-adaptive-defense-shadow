name: DefensiveAutomation S4 Public CI

on:
  push:
    branches:
      - "defensive-automation/s4-public-ci-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-s4-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRIVATE_CANDIDATE_SHA: 19a0b7c8ec7bc31c952c2e1fbcda0923b2ff7658

    steps:
      - name: Checkout Public validation manifest
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate sanitized manifest
        shell: python
        run: |
          import json
          from pathlib import Path
          p = Path("governance/validation/defensive_automation_s4_candidate.json")
          d = json.loads(p.read_text(encoding="utf-8"))
          assert d["task_id"] == "DefensiveAutomation-S4_AutomaticExactActionContractCompiler"
          assert d["private_pr"] == 60
          assert d["immutable_candidate_sha"] == "19a0b7c8ec7bc31c952c2e1fbcda0923b2ff7658"
          assert d["expected_compilation_mode"] == "SEALED_EXACT_CONTRACT_CANDIDATE_SHADOW_ONLY"
          assert d["safety"] == {
              "shadow_only": True,
              "effective": False,
              "execution_allowed": False,
              "executable_contract_present": False,
              "approval_state": "PRE_S9_NOT_APPROVED",
              "lease_present": False,
              "live_apply_authorized": False,
          }
          raw = p.read_text(encoding="utf-8").lower()
          for forbidden in ("ghp_", "github_pat_", "password=", "api_key", "secret="):
              assert forbidden not in raw

      - name: Checkout immutable Private candidate
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Provision isolated test dependencies
        working-directory: _private
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest fastapi pandas python-dotenv httpx uvicorn pyyaml requests websockets

      - name: Validate S4 source safety contract
        working-directory: _private
        shell: python
        run: |
          import importlib.util
          from pathlib import Path
          path = Path("adaptive_defense/automatic_exact_action_contract.py")
          spec = importlib.util.spec_from_file_location("s4_contract", path)
          assert spec is not None and spec.loader is not None
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          assert module.COMPILATION_MODE == "SEALED_EXACT_CONTRACT_CANDIDATE_SHADOW_ONLY"
          assert module.ALLOWED_ACTIONS == {
              "WIDEN_SPACING_DEFENSIVELY",
              "REDUCE_SIZE_LIMIT",
              "REDUCE_ORDER_COUNT_LIMIT",
              "KEEP_EFFECTIVE_LOCKED",
              "PAUSE_REPLENISH",
              "REDUCE_NEW_INVENTORY_BIAS",
          }
          assert module.SAFETY == {
              "shadow_only": True,
              "effective": False,
              "execution_allowed": False,
              "executable_contract_present": False,
              "manual_approval_required": True,
              "approval_state": "PRE_S9_NOT_APPROVED",
              "authorization_granted": False,
              "live_apply_authorized": False,
              "runtime_mutation_allowed": False,
              "network_access_allowed": False,
              "order_mutation_allowed": False,
              "okx_api_accessed": False,
              "orders_modified": False,
          }

      - name: Run S3 and S4 focused regression
        working-directory: _private
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -m pytest -q \
            tests/test_deterministic_five_axis_proposal.py \
            tests/test_automatic_exact_action_contract.py \
            tests/test_effective_governor_action_contract.py \
            tests/test_limited_effective_integration.py

      - name: Verify queue remains S4 before accepted closeout
        working-directory: _private
        shell: python
        run: |
          import json
          from pathlib import Path
          queue = json.loads(Path("docs/roadmap/task_queue.json").read_text(encoding="utf-8"))
          control = json.loads(Path("docs/roadmap/task_queue_parts/control_state.json").read_text(encoding="utf-8"))
          expected = "DefensiveAutomation-S4_AutomaticExactActionContractCompiler"
          assert queue["current_task"] == control["current_task"] == expected
          for state in (queue, control):
              c = state["default_constraints"]
              assert c["shadow_only"] is True
              assert c["effective"] is False
              assert c["execution_allowed"] is False

      - name: Emit sanitized result
        run: |
          echo "DefensiveAutomation S4 immutable candidate: PASS"
          echo "Private candidate: ${PRIVATE_CANDIDATE_SHA}"
          echo "Exact contract: Shadow sealed candidate only"
          echo "Approval: PRE_S9_NOT_APPROVED"
          echo "Lease/executor/runtime proof: NOT_PRESENT / NOT_CLAIMED"
