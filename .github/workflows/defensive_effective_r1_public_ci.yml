name: DefensiveEffective R1 Public CI

on:
  push:
    branches:
      - "defensive-effective/r1-public-ci-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-r1-readonly-collector:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRIVATE_CANDIDATE_SHA: 60e72845946fbb3eb0e166d8669453b692e88702
    steps:
      - uses: actions/checkout@v4
        with:
          ref: \${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Validate candidate manifest
        id: manifest
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path(
              "governance/validation/defensive_effective_r1_candidate.json"
          ).read_text())
          assert data["private_candidate_sha"] == "60e72845946fbb3eb0e166d8669453b692e88702"
          assert data["private_pr"] == 74
          assert data["scope"] == "READONLY_CURRENT_RUNTIME_TWO_SNAPSHOT_COLLECTOR"
          assert data["runtime_access"] is True
          assert not any(data[key] for key in (
              "runtime_mutation", "runtime_reload", "live_apply", "execution",
              "order_actions",
          ))
          assert data["runtime_proof"] == "NOT_CLAIMED"
          assert data["effective_readiness"] == "NOT_READY"
          PY

      - name: Checkout immutable Private candidate
        id: private_checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: \${{ env.PRIVATE_CANDIDATE_SHA }}
          token: \${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Validate R1 source safety contract
        id: validation
        continue-on-error: true
        working-directory: _private
        run: |
          python -m pytest tests/test_collect_defensive_effective_r1_readonly_script.py -q
          python - <<'PY'
          import json
          from pathlib import Path
          queue = json.loads(Path("docs/roadmap/task_queue.json").read_text())
          control = json.loads(
              Path("docs/roadmap/task_queue_parts/control_state.json").read_text()
          )
          latest = json.loads(
              Path("docs/roadmap/defensive_effective/r1/latest.json").read_text()
          )
          task = "DefensiveEffective-R1_CurrentRuntimeReadbackReadonlyCollector"
          assert queue["current_task"] == task == control["current_task"]
          assert queue["in_progress_tasks"] == [task]
          assert control["in_progress_tasks"] == [task]
          assert queue["default_constraints"]["runtime_access_allowed"] is True
          assert queue["default_constraints"]["runtime_mutation_allowed"] is False
          assert queue["default_constraints"]["live_apply_authorized"] is False
          assert queue["default_constraints"]["auto_continue"] is False
          assert latest["status"] == "COLLECTOR_IMPLEMENTED_LOCAL_READONLY_RUN_PENDING"
          assert latest["local_run"]["performed"] is False
          assert latest["validation"]["current_process_identity_proof_available"] is False
          assert latest["safety"]["runtime_proof"] == "NOT_CLAIMED"
          assert latest["safety"]["effective_readiness"] == "NOT_READY"
          PY

      - name: Persist R1 result marker
        if: always() && github.event_name == 'push'
        env:
          MANIFEST_OUTCOME: \${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: \${{ steps.private_checkout.outcome }}
          VALIDATION_OUTCOME: \${{ steps.validation.outcome }}
        run: |
          git pull --rebase origin "\${GITHUB_REF_NAME}"
          python - <<'PY'
          import json, os
          from pathlib import Path
          outcomes = {
              "manifest": os.environ["MANIFEST_OUTCOME"],
              "private_checkout": os.environ["PRIVATE_CHECKOUT_OUTCOME"],
              "validation": os.environ["VALIDATION_OUTCOME"],
          }
          marker = {
              "schema_version": "defensive_effective_r1_public_ci_result_v1",
              "task_id": "DefensiveEffective-R1",
              "status": "PASS" if all(
                  value == "success" for value in outcomes.values()
              ) else "FAIL",
              "immutable_private_candidate":
                  "60e72845946fbb3eb0e166d8669453b692e88702",
              "step_outcomes": outcomes,
              "workflow_revision": "DE_R1_READONLY_COLLECTOR_V1",
              "local_runtime_snapshot": "PENDING",
              "runtime_proof": "NOT_CLAIMED",
              "effective_readiness": "NOT_READY",
              "runtime_mutation": False,
              "runtime_reload": False,
              "live": False,
              "execution": False,
          }
          path = Path(
              "governance/validation/results/defensive_effective_r1_result.json"
          )
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(marker, indent=2, sort_keys=True) + "\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/defensive_effective_r1_result.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: record DefensiveEffective R1 result"
            git push origin "HEAD:\${GITHUB_REF_NAME}"
          fi

      - name: Enforce final result
        if: always()
        env:
          MANIFEST_OUTCOME: \${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: \${{ steps.private_checkout.outcome }}
          VALIDATION_OUTCOME: \${{ steps.validation.outcome }}
        run: |
          test "$MANIFEST_OUTCOME" = success
          test "$PRIVATE_CHECKOUT_OUTCOME" = success
          test "$VALIDATION_OUTCOME" = success
