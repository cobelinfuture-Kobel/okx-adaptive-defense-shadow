name: DefensiveAutomation S9 Queue Sync

on:
  push:
    branches:
      - "defensive-automation/s9-public-ci-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-s9-closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout validation branch
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Validate S9 marker and patch queue
        shell: python
        run: |
          import json
          from pathlib import Path

          marker = json.loads(Path("governance/validation/results/s9_result.json").read_text(encoding="utf-8"))
          assert marker["status"] == "PASS"
          assert marker["immutable_private_candidate"] == "246b3e888cf1a069e709ab563fc5c2dff1b8dc6d"
          assert marker["workflow_revision"] == "S9_AST_SOURCE_SCAN_V1"
          assert marker["policy_envelope_approved"] is True
          assert marker["approval_scope"] == "S10_SHADOW_CONSTRUCTION_AND_VALIDATION_ONLY"
          assert marker["live_apply_authorized"] is False
          assert marker["execution_allowed"] is False

          path = Path("governance/public_task_queue.json")
          queue = json.loads(path.read_text(encoding="utf-8"))
          completed = list(queue["completed_tasks"])
          completed_marker = "DefensiveAutomation-S9_LowestRiskOneShotBridgeAndPolicyEnvelopeApproval_PASS"
          if completed_marker not in completed:
              completed.append(completed_marker)

          queue["current_task"] = "DefensiveAutomation-S10_SingleAxisBoundedAutomation"
          queue["proposed_next_task"] = "DefensiveAutomation-S11_SingleAxisObservationWindow"
          queue["completed_tasks"] = completed
          queue["last_product_task"] = {
              "task_id": "DefensiveAutomation-S9_LowestRiskOneShotBridgeAndPolicyEnvelopeApproval",
              "status": "PASS",
              "private_main_commit": "18adb57d8b915d50d996e328b62a7de660fdc6d5",
              "validated_private_candidate": "246b3e888cf1a069e709ab563fc5c2dff1b8dc6d",
              "private_pr": 65,
              "public_validation_pr": 19,
              "public_ci_run_id": 29583590187,
              "public_ci_job_id": 87894949731,
              "public_ci_result_marker": "governance/validation/results/s9_result.json",
              "public_ci_workflow_revision": "S9_AST_SOURCE_SCAN_V1",
              "policy_envelope_id": "DA-S9-LOWEST-RISK-ONE-SHOT-v1",
              "policy_envelope_version": "1",
              "approval_scope": "S10_SHADOW_CONSTRUCTION_AND_VALIDATION_ONLY",
              "inst_id": "BTC-USDT-SWAP",
              "axis": "INVENTORY_RISK",
              "action": "REDUCE_NEW_INVENTORY_BIAS",
              "parameter_name": "new_inventory_bias",
              "direction": "DECREASE_ONLY",
              "maximum_absolute_delta": 0.05,
              "max_symbols": 1,
              "max_action_count": 1,
              "max_cycles": 1,
              "operator_approval_recorded": True,
              "live_apply_authorized": False,
              "execution_allowed": False,
              "runtime_mutation_allowed": False,
              "separate_final_action_approval_required": True
          }
          queue["operator_authorization"]["exact_policy_envelope_approved"] = True
          queue["operator_authorization"]["approved_envelope_id"] = "DA-S9-LOWEST-RISK-ONE-SHOT-v1"
          queue["operator_authorization"]["approval_scope"] = "S10_SHADOW_CONSTRUCTION_AND_VALIDATION_ONLY"
          queue["operator_authorization"]["live_apply_authorized"] = False
          queue["operator_authorization"]["separate_final_action_approval_required"] = True
          queue["blocking_state"] = {
              "status": "S10_SHADOW_CONSTRUCTION_ALLOWED_LIVE_APPLY_BLOCKED",
              "task_id": "DefensiveAutomation-S10_SingleAxisBoundedAutomation",
              "reason": "S9 exact envelope is approved for S10 Shadow construction only; runtime proof and separate final action approval are still required.",
              "safe_default": "RELOCKED_SHADOW",
              "live_apply_performed": False
          }
          queue["automation_roadmap"]["completed_tasks"] = 15
          queue["automation_roadmap"]["remaining_tasks"] = 7
          queue["automation_roadmap"]["current_task"] = "DefensiveAutomation-S10_SingleAxisBoundedAutomation"
          assert queue["safety"]["shadow_only"] is True
          assert queue["safety"]["effective"] is False
          assert queue["safety"]["execution_allowed"] is False
          assert queue["safety"]["live_one_shot_apply_allowed"] is False
          path.write_text(json.dumps(queue, indent=2, sort_keys=False) + "\n", encoding="utf-8")

      - name: Commit queue sync when changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/public_task_queue.json
          if ! git diff --cached --quiet; then
            git commit -m "roadmap: sync S9 closeout to S10"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Verify synchronized boundary
        shell: python
        run: |
          import json
          from pathlib import Path
          queue = json.loads(Path("governance/public_task_queue.json").read_text(encoding="utf-8"))
          assert queue["current_task"] == "DefensiveAutomation-S10_SingleAxisBoundedAutomation"
          assert queue["proposed_next_task"] == "DefensiveAutomation-S11_SingleAxisObservationWindow"
          assert queue["automation_roadmap"]["completed_tasks"] == 15
          assert queue["automation_roadmap"]["remaining_tasks"] == 7
          assert queue["last_product_task"]["operator_approval_recorded"] is True
          assert queue["last_product_task"]["live_apply_authorized"] is False
          assert queue["operator_authorization"]["exact_policy_envelope_approved"] is True
          assert queue["operator_authorization"]["live_apply_authorized"] is False
          assert queue["safety"]["effective"] is False
          assert queue["safety"]["execution_allowed"] is False
