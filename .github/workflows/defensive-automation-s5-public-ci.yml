name: DefensiveAutomation S5 Public CI

on:
  push:
    branches:
      - "defensive-automation/s5-public-ci-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-s5-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRIVATE_CANDIDATE_SHA: 612c104da32e882b9f53b47ab700827eeede8861

    steps:
      - name: Checkout Public validation manifest
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate sanitized manifest
        shell: python
        run: |
          import json
          from pathlib import Path
          p = Path("governance/validation/defensive_automation_s5_candidate.json")
          d = json.loads(p.read_text(encoding="utf-8"))
          assert d["task_id"] == "DefensiveAutomation-S5_LeaseIdempotencyAndReplayProtection"
          assert d["private_pr"] == 61
          assert d["immutable_candidate_sha"] == "612c104da32e882b9f53b47ab700827eeede8861"
          assert d["expected_coordination_mode"] == "PERSISTENT_SINGLE_WRITER_SHADOW_COORDINATION_ONLY"
          assert d["safety"] == {
              "shadow_only": True,
              "effective": False,
              "execution_allowed": False,
              "lease_coordination_only": True,
              "preflight_authorized": False,
              "mutation_authority_granted": False,
              "live_apply_authorized": False,
          }
          raw = p.read_text(encoding="utf-8").lower()
          for forbidden in ("ghp_", "github_pat_", "password=", "api_key", "secret="):
              assert forbidden not in raw

      - name: Checkout immutable Private candidate
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Provision isolated test dependencies
        working-directory: _private
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest fastapi pandas python-dotenv httpx uvicorn pyyaml requests websockets

      - name: Validate S5 source safety contract
        working-directory: _private
        shell: python
        run: |
          import importlib.util
          from pathlib import Path
          path = Path("adaptive_defense/shadow_lease_idempotency.py")
          spec = importlib.util.spec_from_file_location("s5_lease", path)
          assert spec is not None and spec.loader is not None
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          assert module.COORDINATION_MODE == "PERSISTENT_SINGLE_WRITER_SHADOW_COORDINATION_ONLY"
          assert module.STORE_SCHEMA_VERSION == "DefensiveAutomation-S5.Store.v1"
          assert module.SAFETY == {
              "shadow_only": True,
              "effective": False,
              "execution_allowed": False,
              "lease_coordination_only": True,
              "mutation_authority_granted": False,
              "preflight_authorized": False,
              "runtime_mutation_allowed": False,
              "network_access_allowed": False,
              "order_mutation_allowed": False,
              "authorization_granted": False,
              "live_apply_authorized": False,
              "okx_api_accessed": False,
              "orders_modified": False,
          }
          source = path.read_text(encoding="utf-8")
          assert "os.O_EXCL" in source
          assert "os.replace" in source
          assert "expected_store_revision" in source
          assert "production_executor" not in source.replace('"production_executor"', "")

      - name: Run S4 and S5 focused regression
        working-directory: _private
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -m pytest -q \
            tests/test_automatic_exact_action_contract.py \
            tests/test_shadow_lease_idempotency.py \
            tests/test_limited_effective_integration.py

      - name: Verify queue remains S5 before accepted closeout
        working-directory: _private
        shell: python
        run: |
          import json
          from pathlib import Path
          queue = json.loads(Path("docs/roadmap/task_queue.json").read_text(encoding="utf-8"))
          control = json.loads(Path("docs/roadmap/task_queue_parts/control_state.json").read_text(encoding="utf-8"))
          expected = "DefensiveAutomation-S5_LeaseIdempotencyAndReplayProtection"
          assert queue["current_task"] == control["current_task"] == expected
          for state in (queue, control):
              c = state["default_constraints"]
              assert c["shadow_only"] is True
              assert c["effective"] is False
              assert c["execution_allowed"] is False

      - name: Emit sanitized result
        run: |
          echo "DefensiveAutomation S5 immutable candidate: PASS"
          echo "Private candidate: ${PRIVATE_CANDIDATE_SHA}"
          echo "Lease mode: persistent single-writer Shadow coordination only"
          echo "Preflight/executor/runtime proof: NOT_AUTHORIZED / NOT_PRESENT / NOT_CLAIMED"
