name: DefensiveEffective R4A Contract Alignment Public CI

on:
  push:
    branches:
      - "defensive-effective/r4a-public-ci-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-r4a-fullfix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRIVATE_CANDIDATE_SHA: 7df832fe523e17b9449aaef6d85cc923cb2d1dec
    steps:
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Validate candidate manifest
        id: manifest
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path("governance/validation/defensive_effective_r4a_candidate.json").read_text())
          assert data["private_candidate_sha"]=="7df832fe523e17b9449aaef6d85cc923cb2d1dec"
          assert data["scope"]=="R4_CURRENT_RUNTIME_EVIDENCE_CONTRACT_ALIGNMENT_AND_CONDITION_DISPOSITION"
          assert data["inst_id"]=="BTC-USDT-SWAP"
          assert data["action"]=="REDUCE_NEW_INVENTORY_BIAS"
          assert data["parameter"]=="new_inventory_bias"
          assert data["runtime_access"] is False
          assert not any(data[key] for key in ("runtime_mutation","runtime_reload","live_apply","execution","order_actions"))
          assert data["effective_readiness"]=="NOT_READY"
          PY

      - name: Checkout immutable Private candidate
        id: private_checkout
        continue-on-error: true
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Run R4A focused validation
        id: validation
        continue-on-error: true
        working-directory: _private
        run: |
          python3 -m pip install --disable-pip-version-check pytest==8.4.1
          python3 -m py_compile \
            adaptive_defense/inventory_exit_quality_assisted_simulation.py \
            adaptive_defense/effective_probe_shadow.py \
            adaptive_defense/r4_preflight_runtime_evidence.py \
            sync_service.py
          python3 -m pytest -q \
            tests/test_cross_report_correlation.py \
            tests/test_resolver_shadow_voting.py \
            tests/test_inventory_exit_quality_assisted_simulation.py \
            tests/test_effective_probe_shadow.py \
            tests/test_r4_preflight_correlation.py \
            tests/test_r4_preflight_safety.py \
            tests/test_r1_runtime_readback.py \
            tests/test_r1b_reloadqa_script.py \
            tests/test_v2_decision_resolver.py \
            tests/test_adaptive_defense.py::test_cross_report_correlation_all_reports_aligned
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=no)"

      - name: Persist R4A result marker
        if: always() && github.event_name == 'push'
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"
          python3 - <<'PY'
          import json,os
          from pathlib import Path
          outcomes={"manifest":os.environ["MANIFEST_OUTCOME"],"private_checkout":os.environ["PRIVATE_CHECKOUT_OUTCOME"],"validation":os.environ["VALIDATION_OUTCOME"]}
          passed=all(value=="success" for value in outcomes.values())
          marker={
            "schema_version":"defensive_effective_r4a_public_ci_result_v1",
            "task_id":"DefensiveEffective-R4A_CurrentRuntimeEvidenceContractAlignmentAndConditionDisposition_FullFix",
            "status":"PASS" if passed else "FAIL",
            "immutable_private_candidate":"7df832fe523e17b9449aaef6d85cc923cb2d1dec",
            "step_outcomes":outcomes,
            "focused_test_count":141,
            "local_runtime_qa":"PENDING",
            "runtime_proof":"NOT_CLAIMED",
            "effective_readiness":"NOT_READY",
            "runtime_mutation":False,
            "runtime_reload":False,
            "live":False,
            "execution":False,
          }
          path=Path("governance/validation/results/defensive_effective_r4a_result.json")
          path.parent.mkdir(parents=True,exist_ok=True)
          path.write_text(json.dumps(marker,indent=2,sort_keys=True)+"\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/defensive_effective_r4a_result.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: record DefensiveEffective R4A result"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Enforce final result
        if: always()
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
        run: |
          test "$MANIFEST_OUTCOME" = success
          test "$PRIVATE_CHECKOUT_OUTCOME" = success
          test "$VALIDATION_OUTCOME" = success
