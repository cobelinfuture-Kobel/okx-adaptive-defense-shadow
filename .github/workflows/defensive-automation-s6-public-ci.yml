name: DefensiveAutomation S6 Public CI

on:
  push:
    branches:
      - "defensive-automation/s6-public-ci-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-s6-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRIVATE_CANDIDATE_SHA: 8af977b6c779752aa54ed5404d0cc7239e184243

    steps:
      - name: Checkout Public validation manifest
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Validate sanitized manifest
        id: manifest
        continue-on-error: true
        shell: python
        run: |
          import json
          from pathlib import Path
          p = Path("governance/validation/defensive_automation_s6_candidate.json")
          d = json.loads(p.read_text(encoding="utf-8"))
          assert d["task_id"] == "DefensiveAutomation-S6_PreflightReadbackRollbackEngine"
          assert d["private_pr"] == 62
          assert d["immutable_candidate_sha"] == "8af977b6c779752aa54ed5404d0cc7239e184243"
          assert d["expected_engine_mode"] == "SHADOW_PREFLIGHT_CAS_READBACK_ROLLBACK_RELOCK_SIMULATION_ONLY"
          assert d["expected_focused_test_count_minimum"] >= 20
          assert d["safety"] == {
              "shadow_only": True,
              "effective": False,
              "execution_allowed": False,
              "simulation_only": True,
              "memory_adapter_only": True,
              "runtime_mutation_allowed": False,
              "live_apply_authorized": False,
          }
          raw = p.read_text(encoding="utf-8").lower()
          for forbidden in ("ghp_", "github_pat_", "password=", "api_key", "secret="):
              assert forbidden not in raw

      - name: Checkout immutable Private candidate
        id: private_checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Provision isolated test dependencies
        id: provision
        continue-on-error: true
        working-directory: _private
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest fastapi pandas python-dotenv httpx uvicorn pyyaml requests websockets

      - name: Validate S6 source safety contract
        id: source
        continue-on-error: true
        working-directory: _private
        shell: python
        run: |
          import importlib.util
          from pathlib import Path
          path = Path("adaptive_defense/shadow_preflight_rollback.py")
          spec = importlib.util.spec_from_file_location("s6_preflight", path)
          assert spec is not None and spec.loader is not None
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          assert module.ENGINE_MODE == "SHADOW_PREFLIGHT_CAS_READBACK_ROLLBACK_RELOCK_SIMULATION_ONLY"
          assert module.SAFETY == {
              "shadow_only": True,
              "effective": False,
              "execution_allowed": False,
              "simulation_only": True,
              "memory_adapter_only": True,
              "runtime_mutation_allowed": False,
              "network_access_allowed": False,
              "order_mutation_allowed": False,
              "authorization_granted": False,
              "live_apply_authorized": False,
              "okx_api_accessed": False,
              "orders_modified": False,
          }
          raw = path.read_text(encoding="utf-8")
          for forbidden in ("requests.", "httpx.", "websockets.", "place_order", "cancel_order", "move_order"):
              assert forbidden not in raw

      - name: Run S4 S5 and S6 focused regression
        id: tests
        continue-on-error: true
        working-directory: _private
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -m pytest -q \
            tests/test_automatic_exact_action_contract.py \
            tests/test_shadow_lease_idempotency.py \
            tests/test_shadow_preflight_rollback.py \
            tests/test_limited_effective_integration.py

      - name: Verify queue remains S6 before accepted closeout
        id: queue
        continue-on-error: true
        working-directory: _private
        shell: python
        run: |
          import json
          from pathlib import Path
          queue = json.loads(Path("docs/roadmap/task_queue.json").read_text(encoding="utf-8"))
          control = json.loads(Path("docs/roadmap/task_queue_parts/control_state.json").read_text(encoding="utf-8"))
          expected = "DefensiveAutomation-S6_PreflightReadbackRollbackEngine"
          assert queue["current_task"] == control["current_task"] == expected
          for state in (queue, control):
              constraints = state["default_constraints"]
              assert constraints["shadow_only"] is True
              assert constraints["effective"] is False
              assert constraints["execution_allowed"] is False

      - name: Persist deterministic sanitized CI marker
        if: always() && github.event_name == 'push'
        shell: bash
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          PROVISION_OUTCOME: ${{ steps.provision.outcome }}
          SOURCE_OUTCOME: ${{ steps.source.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          QUEUE_OUTCOME: ${{ steps.queue.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          outcomes = {
              "manifest": os.environ["MANIFEST_OUTCOME"],
              "private_checkout": os.environ["PRIVATE_CHECKOUT_OUTCOME"],
              "provision": os.environ["PROVISION_OUTCOME"],
              "source": os.environ["SOURCE_OUTCOME"],
              "tests": os.environ["TESTS_OUTCOME"],
              "queue": os.environ["QUEUE_OUTCOME"],
          }
          status = "PASS" if all(value == "success" for value in outcomes.values()) else "FAIL"
          marker = {
              "schema_version": "defensive_automation_s6_public_ci_result_v1",
              "task_id": "DefensiveAutomation-S6_PreflightReadbackRollbackEngine",
              "status": status,
              "immutable_private_candidate": "8af977b6c779752aa54ed5404d0cc7239e184243",
              "step_outcomes": outcomes,
              "safety": {
                  "shadow_only": True,
                  "effective": False,
                  "execution_allowed": False,
                  "simulation_only": True,
                  "memory_adapter_only": True,
                  "runtime_mutation_allowed": False,
                  "live_apply_authorized": False
              },
              "authority": "PUBLIC_GITHUB_ACTIONS"
          }
          path = Path("governance/validation/results/defensive_automation_s6_result.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(marker, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/defensive_automation_s6_result.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: record DefensiveAutomation S6 result"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Enforce final CI result
        if: always()
        shell: bash
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          PROVISION_OUTCOME: ${{ steps.provision.outcome }}
          SOURCE_OUTCOME: ${{ steps.source.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          QUEUE_OUTCOME: ${{ steps.queue.outcome }}
        run: |
          for outcome in "$MANIFEST_OUTCOME" "$PRIVATE_CHECKOUT_OUTCOME" "$PROVISION_OUTCOME" "$SOURCE_OUTCOME" "$TESTS_OUTCOME" "$QUEUE_OUTCOME"; do
            if [ "$outcome" != "success" ]; then
              echo "DefensiveAutomation S6 immutable candidate: FAIL"
              exit 1
            fi
          done
          echo "DefensiveAutomation S6 immutable candidate: PASS"
          echo "Private candidate: ${PRIVATE_CANDIDATE_SHA}"
          echo "Runtime/OKX/order access: NOT_PRESENT"
          echo "Live authorization: NOT_GRANTED"
