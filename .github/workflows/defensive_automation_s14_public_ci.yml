name: DefensiveAutomation S14 Public CI

on:
  push:
    branches:
      - "defensive-automation/s14-public-ci-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-s14-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PRIVATE_CANDIDATE_SHA: 42a69769e7c355a39a348b4fbced3f65a8155e27

    steps:
      - name: Checkout Public validation source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Validate candidate manifest
        id: manifest
        continue-on-error: true
        shell: python
        run: |
          import json
          from pathlib import Path
          data = json.loads(Path("governance/validation/s14_candidate.json").read_text(encoding="utf-8"))
          assert data == {
              "task": "DefensiveAutomation-S14",
              "candidate": "42a69769e7c355a39a348b4fbced3f65a8155e27",
              "private_pr": 70,
              "validation_scope": "READONLY_S9_TO_S13_EVIDENCE_AUDIT_AND_RECONCILIATION",
              "automatic_repair_allowed": False,
              "runtime_access_allowed": False,
              "live_apply_authorized": False,
              "execution_allowed": False,
          }

      - name: Checkout immutable Private candidate
        id: private_checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Provision isolated test dependency
        id: provision
        continue-on-error: true
        run: python -m pip install pytest

      - name: Validate S14 readonly source boundary
        id: source
        continue-on-error: true
        working-directory: _private
        shell: python
        run: |
          import ast
          from pathlib import Path
          path = Path("adaptive_defense/evidence_audit_reconciliation.py")
          raw = path.read_text(encoding="utf-8")
          tree = ast.parse(raw)
          assignments = {}
          for node in tree.body:
              if isinstance(node, ast.Assign) and len(node.targets) == 1 and isinstance(node.targets[0], ast.Name):
                  try:
                      assignments[node.targets[0].id] = ast.literal_eval(node.value)
                  except (ValueError, TypeError):
                      pass
          assert assignments["AUDIT_MODE"] == "READONLY_S9_TO_S13_EVIDENCE_AUDIT_AND_RECONCILIATION"
          assert assignments["STAGE_ORDER"] == ("S9", "S10", "S11", "S12", "S13")
          safety = assignments["SAFETY"]
          assert safety["shadow_only"] is True
          assert safety["effective"] is False
          assert safety["execution_allowed"] is False
          assert safety["automatic_evidence_repair_allowed"] is False
          assert safety["runtime_access_allowed"] is False
          assert safety["network_access_allowed"] is False
          assert safety["order_mutation_allowed"] is False
          for forbidden in ("requests.", "httpx.", "websockets.", "place_order", "cancel_order", "move_order", "subprocess.", "os.system"):
              assert forbidden not in raw

      - name: Run S14 focused regression
        id: tests
        continue-on-error: true
        working-directory: _private
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m pytest -q tests/test_evidence_audit_reconciliation.py

      - name: Reconcile actual Private evidence with Public queue
        id: reconciliation
        continue-on-error: true
        shell: python
        run: |
          import json
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path("_private").resolve()))
          from adaptive_defense.evidence_audit_reconciliation import audit_defensive_automation_evidence
          evidence = [
              json.loads(Path(f"_private/docs/roadmap/defensive_automation/{stage}/latest.json").read_text(encoding="utf-8"))
              for stage in ("s9", "s10", "s11", "s12", "s13")
          ]
          private_queue = json.loads(Path("_private/docs/roadmap/task_queue.json").read_text(encoding="utf-8"))
          public_queue = json.loads(Path("governance/public_task_queue.json").read_text(encoding="utf-8"))
          result = audit_defensive_automation_evidence(
              evidence_records=evidence,
              private_queue=private_queue,
              public_queue=public_queue,
          )
          assert result["audit_state"] == "EVIDENCE_RECONCILED_SHADOW_ONLY", result["denial_reasons"]
          assert result["evidence_record_count"] == 5
          assert result["s15_progression_recommended"] is True
          assert result["automatic_repair_performed"] is False
          assert result["live_apply_authorized"] is False
          assert result["execution_allowed"] is False
          assert len(result["reconciliation_digest"]) == 64

      - name: Verify queues remain S14 before closeout
        id: queue
        continue-on-error: true
        shell: python
        run: |
          import json
          from pathlib import Path
          private = json.loads(Path("_private/docs/roadmap/task_queue.json").read_text(encoding="utf-8"))
          public = json.loads(Path("governance/public_task_queue.json").read_text(encoding="utf-8"))
          expected = "DefensiveAutomation-S14_EvidenceAuditAndReconciliation"
          assert private["current_task"] == public["current_task"] == expected
          assert private["default_constraints"]["shadow_only"] is True
          assert private["default_constraints"]["effective"] is False
          assert private["default_constraints"]["execution_allowed"] is False
          assert public["safety"]["shadow_only"] is True
          assert public["safety"]["effective"] is False
          assert public["safety"]["execution_allowed"] is False

      - name: Persist sanitized S14 result marker
        if: always() && github.event_name == 'push'
        shell: bash
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          PROVISION_OUTCOME: ${{ steps.provision.outcome }}
          SOURCE_OUTCOME: ${{ steps.source.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          RECONCILIATION_OUTCOME: ${{ steps.reconciliation.outcome }}
          QUEUE_OUTCOME: ${{ steps.queue.outcome }}
        run: |
          TARGET_BRANCH="${GITHUB_REF_NAME}"
          git pull --rebase origin "${TARGET_BRANCH}"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          outcomes = {
              "manifest": os.environ["MANIFEST_OUTCOME"],
              "private_checkout": os.environ["PRIVATE_CHECKOUT_OUTCOME"],
              "provision": os.environ["PROVISION_OUTCOME"],
              "source": os.environ["SOURCE_OUTCOME"],
              "tests": os.environ["TESTS_OUTCOME"],
              "reconciliation": os.environ["RECONCILIATION_OUTCOME"],
              "queue": os.environ["QUEUE_OUTCOME"],
          }
          marker = {
              "schema_version": "defensive_automation_s14_public_ci_result_v1",
              "task_id": "DefensiveAutomation-S14",
              "status": "PASS" if all(value == "success" for value in outcomes.values()) else "FAIL",
              "immutable_private_candidate": "42a69769e7c355a39a348b4fbced3f65a8155e27",
              "step_outcomes": outcomes,
              "workflow_revision": "S14_AST_SOURCE_SCAN_V1",
              "required_stage_count": 5,
              "automatic_repair_allowed": False,
              "runtime_access_allowed": False,
              "live_apply_authorized": False,
              "execution_allowed": False,
          }
          path = Path("governance/validation/results/s14_result.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(marker, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/s14_result.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: record DefensiveAutomation S14 result"
            git push origin "HEAD:${TARGET_BRANCH}"
          fi

      - name: Enforce final S14 result
        if: always()
        shell: bash
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          PROVISION_OUTCOME: ${{ steps.provision.outcome }}
          SOURCE_OUTCOME: ${{ steps.source.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          RECONCILIATION_OUTCOME: ${{ steps.reconciliation.outcome }}
          QUEUE_OUTCOME: ${{ steps.queue.outcome }}
        run: |
          for outcome in "$MANIFEST_OUTCOME" "$PRIVATE_CHECKOUT_OUTCOME" "$PROVISION_OUTCOME" "$SOURCE_OUTCOME" "$TESTS_OUTCOME" "$RECONCILIATION_OUTCOME" "$QUEUE_OUTCOME"; do
            if [ "$outcome" != "success" ]; then
              echo "DefensiveAutomation S14 immutable candidate: FAIL"
              exit 1
            fi
          done
          echo "DefensiveAutomation S14 immutable candidate: PASS"
          echo "Scope: readonly S9-S13 evidence audit and Private/Public reconciliation"
          echo "Automatic repair: FORBIDDEN"
          echo "Live apply: NOT_AUTHORIZED"
