name: DefensiveAutomation S11 Queue Sync

on:
  push:
    branches:
      - "defensive-automation/s11-public-ci-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-s11-closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout validation branch
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Validate S11 evidence and patch queue
        shell: python
        run: |
          import json
          from pathlib import Path

          marker = json.loads(Path("governance/validation/results/s11_result.json").read_text(encoding="utf-8"))
          assert marker["status"] == "PASS"
          assert marker["immutable_private_candidate"] == "15d981961891690fb767ac30a2608af576293640"
          assert marker["workflow_revision"] == "S11_AST_SOURCE_SCAN_V1"
          assert marker["observation_window_ms"] == 900000
          assert marker["fixed_record_set_only"] is True
          assert marker["background_loop"] is False
          assert marker["live_apply_authorized"] is False
          assert marker["execution_allowed"] is False

          path = Path("governance/public_task_queue.json")
          queue = json.loads(path.read_text(encoding="utf-8"))
          completed = list(queue["completed_tasks"])
          completed_marker = "DefensiveAutomation-S11_SingleAxisObservationWindow_PASS"
          if completed_marker not in completed:
              completed.append(completed_marker)

          queue["current_task"] = "DefensiveAutomation-S12_ThreeAxisBoundedArbitration"
          queue["proposed_next_task"] = "DefensiveAutomation-S13_CircuitBreakerAndAutomaticRelock"
          queue["completed_tasks"] = completed
          queue["last_product_task"] = {
              "task_id": "DefensiveAutomation-S11_SingleAxisObservationWindow",
              "status": "PASS",
              "private_main_commit": "7d5e63a8d0410168c2ce8373a71e0b8d085f4d58",
              "validated_private_candidate": "15d981961891690fb767ac30a2608af576293640",
              "private_pr": 67,
              "public_validation_pr": 21,
              "public_ci_run_id": 29586930272,
              "public_ci_job_id": 87906116561,
              "public_ci_result_marker": "governance/validation/results/s11_result.json",
              "public_ci_workflow_revision": "S11_AST_SOURCE_SCAN_V1",
              "observation_window_ms": 900000,
              "fixed_record_set_only": True,
              "background_loop": False,
              "single_cycle_bound": True,
              "terminal_parity_verified": True,
              "digest_continuity_verified": True,
              "rollback_terminal_supported": True,
              "hard_lock_blocks_progression": True,
              "live_apply_authorized": False,
              "execution_allowed": False,
              "runtime_mutation_allowed": False
          }
          queue["automation_roadmap"]["completed_tasks"] = 17
          queue["automation_roadmap"]["remaining_tasks"] = 5
          queue["automation_roadmap"]["current_task"] = "DefensiveAutomation-S12_ThreeAxisBoundedArbitration"
          queue["blocking_state"] = {
              "status": "S12_THREE_AXIS_SHADOW_ARBITRATION_REQUIRED_LIVE_APPLY_BLOCKED",
              "task_id": "DefensiveAutomation-S12_ThreeAxisBoundedArbitration",
              "reason": "S11 fixed-window evidence passed; bounded three-axis Shadow arbitration remains required.",
              "safe_default": "RELOCKED_SHADOW",
              "live_apply_performed": False
          }
          assert queue["safety"]["shadow_only"] is True
          assert queue["safety"]["effective"] is False
          assert queue["safety"]["execution_allowed"] is False
          assert queue["operator_authorization"]["live_apply_authorized"] is False
          path.write_text(json.dumps(queue, indent=2, sort_keys=False) + "\n", encoding="utf-8")

      - name: Commit queue sync when changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/public_task_queue.json
          if ! git diff --cached --quiet; then
            git commit -m "roadmap: sync S11 closeout to S12"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Verify synchronized boundary
        shell: python
        run: |
          import json
          from pathlib import Path
          queue = json.loads(Path("governance/public_task_queue.json").read_text(encoding="utf-8"))
          assert queue["current_task"] == "DefensiveAutomation-S12_ThreeAxisBoundedArbitration"
          assert queue["proposed_next_task"] == "DefensiveAutomation-S13_CircuitBreakerAndAutomaticRelock"
          assert queue["automation_roadmap"]["completed_tasks"] == 17
          assert queue["automation_roadmap"]["remaining_tasks"] == 5
          assert queue["last_product_task"]["live_apply_authorized"] is False
          assert queue["safety"]["effective"] is False
          assert queue["safety"]["execution_allowed"] is False
