name: Defensive Effective R4 Public CI

on:
  push:
    branches: ["validation/r4-*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-r4:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRIVATE_CANDIDATE_SHA: 77f85375e42d2d8a29aa7037447f9fed8c67a4e1
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: true

      - name: Validate manifest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path("governance/validation/defensive_effective_r4_candidate.json").read_text())
          assert d["private_candidate_sha"]=="77f85375e42d2d8a29aa7037447f9fed8c67a4e1"
          assert d["private_pr"]==107
          assert d["validation_scope"]=="existing_r1_get_contract_lineage_and_current_runtime_preflight_projection"
          assert d["expected_r4_test_count"]==10
          assert d["exact_inst_id"]=="BTC-USDT-SWAP"
          assert d["exact_action"]=="REDUCE_NEW_INVENTORY_BIAS"
          assert not any(d[k] for k in (
              "new_route","new_runtime_publisher","new_service","new_executor",
              "runtime_access","runtime_mutation","live_activation","execution","order_actions",
          ))
          assert d["overall_progress"]==63
          assert d["distance_to_goal"]==37
          assert d["effective_readiness"]=="NOT_READY"
          PY

      - name: Checkout immutable Private candidate
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Compile and run focused regressions
        working-directory: _private
        run: |
          python -m pip install --disable-pip-version-check -q pytest
          python -m py_compile \
            adaptive_defense/r4_preflight_contract_lineage.py \
            adaptive_defense/r4_preflight_runtime_evidence.py \
            adaptive_defense/r4_preflight_evidence_projection.py \
            adaptive_defense/r1_runtime_readback.py \
            api/routes_status.py \
            tests/test_r4_preflight_correlation.py \
            tests/test_r4_preflight_safety.py \
            tests/test_r1_runtime_readback.py
          R4_COUNT=$(python -m pytest --collect-only -q \
            tests/test_r4_preflight_correlation.py \
            tests/test_r4_preflight_safety.py | grep -c '::test_')
          test "$R4_COUNT" -eq 10
          TOTAL_COUNT=$(python -m pytest --collect-only -q \
            tests/test_r4_preflight_correlation.py \
            tests/test_r4_preflight_safety.py \
            tests/test_r1_runtime_readback.py | grep -c '::test_')
          test "$TOTAL_COUNT" -eq 21
          python -m pytest -q \
            tests/test_r4_preflight_correlation.py \
            tests/test_r4_preflight_safety.py \
            tests/test_r1_runtime_readback.py

      - name: Validate R4 lineage and safety boundary
        working-directory: _private
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from adaptive_defense.r4_preflight_contract_lineage import load_contract_lineage_proof

          proof=load_contract_lineage_proof()
          assert proof["lineage_state"]=="MATCH", proof["denial_reasons"]
          assert proof["s14_governor_binding_state"]=="MATCH"
          assert proof["s15_canary_binding_state"]=="MATCH"
          assert proof["action"]=="REDUCE_NEW_INVENTORY_BIAS"
          assert proof["parameter"]=="new_inventory_bias"
          assert proof["authorization_granted"] is False
          assert proof["runtime_mutation_allowed"] is False
          assert proof["live_apply_authorized"] is False

          task="DefensiveEffective-R4_CurrentRuntimeOneShotCanaryPreflightEvidenceCorrelation_FullFix"
          q=json.loads(Path("docs/roadmap/task_queue.json").read_text())
          c=json.loads(Path("docs/roadmap/task_queue_parts/control_state.json").read_text())
          p=json.loads(Path("docs/governance/r4/latest.json").read_text())
          assert q["current_task"]==task==c["current_task"]
          assert q["in_progress_tasks"]==[task]==c["in_progress_tasks"]
          assert q["next_approved_task"]==task==c["next_approved_task"]
          assert p["status"]=="FULLFIX_IMPLEMENTED_PUBLIC_CI_PENDING"
          assert p["mainline"]["overall_progress"]==63
          assert p["mainline"]["distance_to_goal"]==37
          assert p["acceptance"]["current_runtime_get_proof"]=="NOT_CLAIMED"
          for key,value in {
              "shadow_only":True,"effective":False,"execution_allowed":False,
              "runtime_access_allowed":False,"runtime_mutation_allowed":False,
              "live_apply_authorized":False,"isolated_canary_process_allowed":False,
              "production_process_restart_allowed":False,
          }.items():
              assert q["default_constraints"][key] is value

          route=Path("api/routes_status.py").read_text()
          assert route.count('@router.get("/defensive-effective/r1-readback")')==1
          assert "enrich_r1_runtime_readback" in route
          assert "build_r1_runtime_readback" in route
          sources="\n".join(Path(path).read_text() for path in (
              "adaptive_defense/r4_preflight_contract_lineage.py",
              "adaptive_defense/r4_preflight_runtime_evidence.py",
              "adaptive_defense/r4_preflight_evidence_projection.py",
          ))
          for token in ("requests.","httpx.","subprocess.","socket."):
              assert token not in sources
          assert '"authorization_granted":False' in sources.replace(" ","")
          assert '"current_runtime_apply_allowed":False' in sources.replace(" ","")
          PY

      - name: Persist R4 result
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"
          python - <<'PY'
          import json
          from pathlib import Path
          result={
              "schema_version":"defensive_effective_r4_public_ci_result_v1",
              "task_id":"DefensiveEffective-R4_CurrentRuntimeOneShotCanaryPreflightEvidenceCorrelation_FullFix",
              "validation_scope":"existing_r1_get_contract_lineage_and_current_runtime_preflight_projection",
              "status":"PASS",
              "immutable_private_candidate":"77f85375e42d2d8a29aa7037447f9fed8c67a4e1",
              "private_pr":107,
              "compile":"PASS",
              "r4_focused_test_count":10,
              "r1_regression_test_count":11,
              "total_test_count":21,
              "focused_tests":"PASS",
              "contract_lineage":"PASS",
              "fail_closed_scope":"PASS",
              "new_routes":0,
              "new_runtime_publishers":0,
              "new_services":0,
              "new_executors":0,
              "runtime_access":False,
              "runtime_mutation":False,
              "live_activation":False,
              "execution":False,
              "order_actions":False,
              "current_runtime_get_proof":"NOT_CLAIMED",
              "overall_progress":63,
              "distance_to_goal":37,
              "effective_readiness":"NOT_READY",
          }
          path=Path("governance/validation/results/defensive_effective_r4_result.json")
          path.parent.mkdir(parents=True,exist_ok=True)
          path.write_text(json.dumps(result,indent=2,sort_keys=True)+"\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/defensive_effective_r4_result.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: record R4 preflight validation"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
