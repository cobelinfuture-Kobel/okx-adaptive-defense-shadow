name: Defensive Effective R4 Public CI

on:
  push:
    branches: ["validation/r4-*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-r4:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRIVATE_CANDIDATE_SHA: f85bdc278a443e03bed2e0a58fbfcb6a3d8278e6
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: true

      - id: manifest
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path("governance/validation/defensive_effective_r4_candidate.json").read_text())
          assert d["private_candidate_sha"]=="f85bdc278a443e03bed2e0a58fbfcb6a3d8278e6"
          assert d["private_pr"]==107 and d["expected_r4_test_count"]==10
          assert d["exact_inst_id"]=="BTC-USDT-SWAP"
          assert d["exact_action"]=="REDUCE_NEW_INVENTORY_BIAS"
          assert not any(d[k] for k in ("new_route","new_runtime_publisher","new_service","new_executor","runtime_access","runtime_mutation","live_activation","execution","order_actions"))
          assert d["overall_progress"]==63 and d["distance_to_goal"]==37
          assert d["effective_readiness"]=="NOT_READY"
          PY

      - id: private_checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - id: tests
        if: steps.private_checkout.outcome == 'success'
        continue-on-error: true
        working-directory: _private
        run: |
          set +e
          (
            set -e
            python -m pip install --disable-pip-version-check -q pytest
            python -m py_compile \
              adaptive_defense/r4_preflight_contract_lineage.py \
              adaptive_defense/r4_preflight_runtime_evidence.py \
              adaptive_defense/r4_preflight_evidence_projection.py \
              adaptive_defense/r1_runtime_readback.py \
              api/routes_status.py \
              tests/test_r4_preflight_correlation.py \
              tests/test_r4_preflight_safety.py \
              tests/test_r1_runtime_readback.py
            R4_COUNT=$(python -m pytest --collect-only -q tests/test_r4_preflight_correlation.py tests/test_r4_preflight_safety.py | grep -c '::test_')
            echo "R4_COUNT=$R4_COUNT"
            test "$R4_COUNT" -eq 10
            TOTAL_COUNT=$(python -m pytest --collect-only -q tests/test_r4_preflight_correlation.py tests/test_r4_preflight_safety.py tests/test_r1_runtime_readback.py | grep -c '::test_')
            echo "TOTAL_COUNT=$TOTAL_COUNT"
            test "$TOTAL_COUNT" -eq 21
            python -m pytest -q tests/test_r4_preflight_correlation.py tests/test_r4_preflight_safety.py tests/test_r1_runtime_readback.py
          ) > ../r4_tests.log 2>&1
          rc=$?
          cat ../r4_tests.log
          exit $rc

      - id: boundary
        if: steps.private_checkout.outcome == 'success'
        continue-on-error: true
        working-directory: _private
        run: |
          set +e
          python - <<'PY' > ../r4_boundary.log 2>&1
          import json
          from pathlib import Path
          from adaptive_defense.r4_preflight_contract_lineage import load_contract_lineage_proof
          proof=load_contract_lineage_proof()
          print(json.dumps(proof,indent=2,sort_keys=True))
          assert proof["lineage_state"]=="MATCH", proof["denial_reasons"]
          assert proof["s14_governor_binding_state"]=="MATCH"
          assert proof["s15_canary_binding_state"]=="MATCH"
          assert proof["action"]=="REDUCE_NEW_INVENTORY_BIAS"
          assert proof["parameter"]=="new_inventory_bias"
          assert proof["authorization_granted"] is False
          assert proof["runtime_mutation_allowed"] is False
          assert proof["live_apply_authorized"] is False
          task="DefensiveEffective-R4_CurrentRuntimeOneShotCanaryPreflightEvidenceCorrelation_FullFix"
          q=json.loads(Path("docs/roadmap/task_queue.json").read_text())
          c=json.loads(Path("docs/roadmap/task_queue_parts/control_state.json").read_text())
          p=json.loads(Path("docs/governance/r4/latest.json").read_text())
          assert q["current_task"]==task==c["current_task"]
          assert q["in_progress_tasks"]==[task]==c["in_progress_tasks"]
          assert q["next_approved_task"]==task==c["next_approved_task"]
          assert p["status"]=="FULLFIX_IMPLEMENTED_PUBLIC_CI_PENDING"
          route=Path("api/routes_status.py").read_text()
          assert route.count('@router.get("/defensive-effective/r1-readback")')==1
          assert "enrich_r1_runtime_readback" in route
          sources="\n".join(Path(path).read_text() for path in ("adaptive_defense/r4_preflight_contract_lineage.py","adaptive_defense/r4_preflight_runtime_evidence.py","adaptive_defense/r4_preflight_evidence_projection.py"))
          for token in ("requests.","httpx.","subprocess.","socket."):
              assert token not in sources
          assert '"authorization_granted":False' in sources.replace(" ","")
          assert '"current_runtime_apply_allowed":False' in sources.replace(" ","")
          PY
          rc=$?
          cat ../r4_boundary.log
          exit $rc

      - id: persist
        if: always()
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          BOUNDARY_OUTCOME: ${{ steps.boundary.outcome }}
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"
          python - <<'PY'
          import json, os
          from pathlib import Path
          outcomes={"manifest":os.environ.get("MANIFEST_OUTCOME","unknown"),"private_checkout":os.environ.get("CHECKOUT_OUTCOME","unknown"),"tests":os.environ.get("TESTS_OUTCOME","unknown"),"boundary":os.environ.get("BOUNDARY_OUTCOME","unknown")}
          def tail(name):
              path=Path(name)
              return path.read_text(errors="replace")[-6000:] if path.exists() else ""
          status="PASS" if all(value=="success" for value in outcomes.values()) else "FAIL"
          result={
              "schema_version":"defensive_effective_r4_public_ci_result_v2","task_id":"DefensiveEffective-R4_CurrentRuntimeOneShotCanaryPreflightEvidenceCorrelation_FullFix",
              "status":status,"immutable_private_candidate":"f85bdc278a443e03bed2e0a58fbfcb6a3d8278e6","private_pr":107,
              "step_outcomes":outcomes,"tests_diagnostic_tail":tail("r4_tests.log"),"boundary_diagnostic_tail":tail("r4_boundary.log"),
              "r4_focused_test_count":10,"r1_regression_test_count":11,"total_test_count":21,
              "current_runtime_get_proof":"NOT_CLAIMED","runtime_access":False,"runtime_mutation":False,"live_activation":False,"execution":False,"order_actions":False,
              "overall_progress":63,"distance_to_goal":37,"effective_readiness":"NOT_READY",
          }
          path=Path("governance/validation/results/defensive_effective_r4_result.json")
          path.parent.mkdir(parents=True,exist_ok=True)
          path.write_text(json.dumps(result,indent=2,sort_keys=True)+"\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/defensive_effective_r4_result.json
          git commit -m "ci: record R4 canonical-path validation" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          result=json.loads(Path("governance/validation/results/defensive_effective_r4_result.json").read_text())
          assert result["status"]=="PASS", result["step_outcomes"]
          PY
