name: Defensive Effective R1D Public CI

on:
  push:
    branches: ["defensive-effective/r1d-*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-r1d:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRIVATE_CANDIDATE_SHA: d6c909ca5e04e8c98e831df6faf9a57ca0fe804e
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Validate manifest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path("governance/validation/defensive_effective_r1d_candidate.json").read_text())
          assert d["private_candidate_sha"]=="d6c909ca5e04e8c98e831df6faf9a57ca0fe804e"
          assert d["private_pr"]==97
          assert d["runtime_proof"]=="NOT_CLAIMED_PENDING_FRESH_PROCESS_GET"
          assert d["effective_readiness"]=="NOT_READY"
          assert not any(d[k] for k in ("new_production_module","new_runner","production_process_replacement","runtime_parameter_mutation","live_apply","execution","order_actions"))
          PY

      - name: Checkout immutable Private candidate
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Compile and run focused regressions
        working-directory: _private
        run: |
          python -m py_compile adaptive_defense/canonical_signal_eligibility.py adaptive_defense/r1_runtime_readback.py tests/test_r1_runtime_readback.py
          python - <<'PY'
          import runpy
          p="tests/test_r1_runtime_readback.py"
          ns=runpy.run_path(p)
          tests=sorted((n,f) for n,f in ns.items() if n.startswith("test_") and callable(f))
          assert tests
          for n,f in tests:
              f()
              print(f"PASS {p}::{n}")
          print(f"FOCUSED_TEST_COUNT={len(tests)}")
          PY

      - name: Validate lineage and safety
        working-directory: _private
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          task="DefensiveEffective-R1D_NewInventoryBiasRuntimeAuthorityAndReadback_FullFix"
          q=json.loads(Path("docs/roadmap/task_queue.json").read_text())
          c=json.loads(Path("docs/roadmap/task_queue_parts/control_state.json").read_text())
          p=json.loads(Path("docs/governance/r1d/latest.json").read_text())
          assert q["current_task"]==task==c["current_task"]
          assert q["in_progress_tasks"]==[task]==c["in_progress_tasks"]
          assert q["next_approved_task"]==task
          for k,v in {"shadow_only":True,"effective":False,"execution_allowed":False,"runtime_access_allowed":False,"runtime_mutation_allowed":False,"live_apply_authorized":False,"isolated_canary_process_allowed":False}.items():
              assert q["default_constraints"][k] is v
          assert p["status"]=="FULLFIX_IMPLEMENTED_PUBLIC_CI_PENDING"
          assert p["progress"]["overall_after_source_fullfix"]==60
          assert p["progress"]["distance_after_source_fullfix"]==40
          s=Path("adaptive_defense/r1_runtime_readback.py").read_text()
          for token in ("build_new_inventory_bias_runtime_authority","consume_new_inventory_bias_runtime_authority",'PARAMETER_NEUTRAL_VALUE = 0.0','"PRESENT_NEUTRAL_SHADOW_READONLY"','"DENIED_FAIL_CLOSED"','"runtime_mutation_allowed": False','"live_apply_authorized": False','"order_action_allowed": False'):
              assert token in s
          for forbidden in ("MemoryParameterAdapter","setattr(","requests.","httpx."):
              assert forbidden not in s
          PY

      - name: Persist R1D result
        if: github.event_name == 'push'
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"
          python - <<'PY'
          import json
          from pathlib import Path
          m={"schema_version":"defensive_effective_r1d_public_ci_result_v1","task_id":"DefensiveEffective-R1D_NewInventoryBiasRuntimeAuthorityAndReadback_FullFix","status":"PASS","immutable_private_candidate":"d6c909ca5e04e8c98e831df6faf9a57ca0fe804e","private_pr":97,"compile":"PASS","focused_tests":"PASS","governance":"PASS","new_production_modules":0,"new_runners":0,"runtime_parameter_mutation":False,"live":False,"execution":False,"order_actions":False,"runtime_proof":"NOT_CLAIMED_PENDING_FRESH_PROCESS_GET","effective_readiness":"NOT_READY"}
          p=Path("governance/validation/results/defensive_effective_r1d_result.json")
          p.parent.mkdir(parents=True,exist_ok=True)
          p.write_text(json.dumps(m,indent=2,sort_keys=True)+"\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/defensive_effective_r1d_result.json
          if ! git diff --cached --quiet; then git commit -m "ci: record R1D validation"; git push origin "HEAD:${GITHUB_REF_NAME}"; fi
