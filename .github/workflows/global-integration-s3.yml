name: Defensive Effective R2 Public CI

on:
  push:
    branches: ["validation/r2-*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-r2:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRIVATE_CANDIDATE_SHA: 2593b4210551a57b404e0ef133bf705b64858a70
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Validate manifest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path("governance/validation/defensive_effective_r2_candidate.json").read_text())
          assert d["private_candidate_sha"]=="2593b4210551a57b404e0ef133bf705b64858a70"
          assert d["private_pr"]==103
          assert d["validation_scope"]=="r1d_parameter_to_s14_governor_to_s15_canary_shadow_contract_lineage"
          assert d["expected_focused_test_count"]==27
          assert d["new_action_class"]=="REDUCE_NEW_INVENTORY_BIAS"
          assert not any(d[k] for k in ("new_production_module","new_runner","new_executor","runtime_access","runtime_mutation","live_activation","execution","order_actions"))
          assert d["effective_readiness"]=="NOT_READY"
          PY

      - name: Checkout immutable Private candidate
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Compile and run focused regressions
        working-directory: _private
        run: |
          python -m py_compile \
            adaptive_defense/effective_governor_action_contract.py \
            adaptive_defense/defensive_parameter_canary.py \
            tests/test_effective_governor_action_contract.py \
            tests/test_defensive_parameter_canary.py
          python - <<'PY'
          import runpy
          total=0
          for p in (
              "tests/test_effective_governor_action_contract.py",
              "tests/test_defensive_parameter_canary.py",
          ):
              ns=runpy.run_path(p)
              tests=sorted((n,f) for n,f in ns.items() if n.startswith("test_") and callable(f))
              assert tests
              for n,f in tests:
                  f()
                  total+=1
                  print(f"PASS {p}::{n}")
          assert total==27, total
          print(f"FOCUSED_TEST_COUNT={total}")
          PY

      - name: Validate contract lineage and safety
        working-directory: _private
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from adaptive_defense.effective_governor_action_contract import ALLOWED_ACTION_CLASSES as governor_actions
          from adaptive_defense.defensive_parameter_canary import ALLOWED_ACTION_CLASSES as canary_actions

          expected={
              "DEFENSIVE_SPACING",
              "DEFENSIVE_SIZING",
              "DEFENSIVE_ORDER_COUNT_CAP",
              "SERVICE_FLOOR_PRESERVATION",
              "REDUCE_NEW_INVENTORY_BIAS",
          }
          assert governor_actions==expected
          assert canary_actions==expected

          task="DefensiveEffective-R2_NewInventoryBiasGovernorCanaryContractLineage_FullFix"
          q=json.loads(Path("docs/roadmap/task_queue.json").read_text())
          c=json.loads(Path("docs/roadmap/task_queue_parts/control_state.json").read_text())
          p=json.loads(Path("docs/governance/r2/latest.json").read_text())
          assert q["current_task"]==task==c["current_task"]
          assert q["in_progress_tasks"]==[task]==c["in_progress_tasks"]
          assert q["next_approved_task"]==task==c["next_approved_task"]
          assert p["status"]=="FULLFIX_IMPLEMENTED_PUBLIC_CI_PENDING"
          assert p["mainline"]["overall_progress"]==61
          assert p["mainline"]["distance_to_goal"]==39
          for key,value in {
              "shadow_only":True,
              "effective":False,
              "execution_allowed":False,
              "runtime_access_allowed":False,
              "runtime_mutation_allowed":False,
              "live_apply_authorized":False,
              "isolated_canary_process_allowed":False,
              "production_process_restart_allowed":False,
          }.items():
              assert q["default_constraints"][key] is value

          governor=Path("adaptive_defense/effective_governor_action_contract.py").read_text()
          canary=Path("adaptive_defense/defensive_parameter_canary.py").read_text()
          for source in (governor,canary):
              for token in (
                  'NEW_INVENTORY_BIAS_ACTION_CLASS = "REDUCE_NEW_INVENTORY_BIAS"',
                  '"parameter_revision"',
                  '"parameter_source_sha256"',
                  '"runtime_consumer_sha256"',
                  '"one_shot_only"',
                  '"auto_loop"',
                  '"automatic_relock_to_shadow"',
                  '"authorization_granted": False',
                  '"runtime_mutation_allowed": False',
                  '"live_apply_authorized": False',
              ):
                  assert token in source
              for forbidden in (
                  "requests.","httpx.","subprocess.","socket.",
                  "place_order(","cancel_order(","amend_order(","apply_parameter(",
              ):
                  assert forbidden not in source
          assert "proposed_delta >= 0" in canary
          assert "SIGNAL_SAFETY_AND_PARAMETER_READBACK_PROVEN" in governor
          assert "PRESENT_NEUTRAL_SHADOW_READONLY" in governor
          PY

      - name: Persist R2 result
        if: github.event_name == 'push'
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"
          python - <<'PY'
          import json
          from pathlib import Path
          m={
              "schema_version":"defensive_effective_r2_public_ci_result_v1",
              "task_id":"DefensiveEffective-R2_NewInventoryBiasGovernorCanaryContractLineage_FullFix",
              "validation_scope":"r1d_parameter_to_s14_governor_to_s15_canary_shadow_contract_lineage",
              "status":"PASS",
              "immutable_private_candidate":"2593b4210551a57b404e0ef133bf705b64858a70",
              "private_pr":103,
              "compile":"PASS",
              "focused_test_count":27,
              "focused_tests":"PASS",
              "lineage_and_safety":"PASS",
              "new_action_class":"REDUCE_NEW_INVENTORY_BIAS",
              "new_production_modules":0,
              "new_runners":0,
              "new_executors":0,
              "runtime_access":False,
              "runtime_mutation":False,
              "live_activation":False,
              "execution":False,
              "order_actions":False,
              "effective_readiness":"NOT_READY",
          }
          p=Path("governance/validation/results/defensive_effective_r2_result.json")
          p.parent.mkdir(parents=True,exist_ok=True)
          p.write_text(json.dumps(m,indent=2,sort_keys=True)+"\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/defensive_effective_r2_result.json
          if ! git diff --cached --quiet; then git commit -m "ci: record R2 contract lineage validation"; git push origin "HEAD:${GITHUB_REF_NAME}"; fi
