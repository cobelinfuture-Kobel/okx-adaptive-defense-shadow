name: Defensive Effective R6 Public CI

on:
  push:
    branches: ["validation/r6-*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-r6:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRIVATE_CANDIDATE_SHA: 0795327809ac66f3a5dda0c96716a96788c3ea93
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: true

      - id: manifest
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path("governance/validation/defensive_effective_r6_candidate.json").read_text())
          assert d["private_candidate_sha"]=="0795327809ac66f3a5dda0c96716a96788c3ea93"
          assert d["private_pr"]==114 and d["expected_r6_test_count"]==13
          assert d["exact_inst_id"]=="BTC-USDT-SWAP"
          assert d["exact_action"]=="REDUCE_NEW_INVENTORY_BIAS"
          assert d["exact_parameter"]=="new_inventory_bias"
          assert d["canary_value"]==-0.05 and d["baseline_value"]==0.0
          assert d["current_process_parameter_mutation"] is True
          assert d["order_actions"] is False and d["auto_loop"] is False
          PY

      - id: private_checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - id: tests
        if: steps.private_checkout.outcome == 'success'
        continue-on-error: true
        working-directory: _private
        run: |
          set +e
          (
            set -e
            python -m pip install --disable-pip-version-check -q pytest
            python -m py_compile adaptive_defense/r6_one_shot_defensive_canary.py api/routes_defensive_effective.py tests/test_r6_one_shot_defensive_canary.py
            R6_COUNT=$(python -m pytest --collect-only -q tests/test_r6_one_shot_defensive_canary.py | grep -c '::test_')
            echo "R6_COUNT=$R6_COUNT"
            test "$R6_COUNT" -eq 13
            python -m pytest -q tests/test_r6_one_shot_defensive_canary.py
          ) > ../r6_tests.log 2>&1
          rc=$?
          cat ../r6_tests.log
          exit $rc

      - id: boundary
        if: steps.private_checkout.outcome == 'success'
        continue-on-error: true
        working-directory: _private
        run: |
          set +e
          python - <<'PY' > ../r6_boundary.log 2>&1
          import json
          from pathlib import Path
          task="DefensiveEffective-R6_OperatorApprovedOneShotDefensiveParameterCanary"
          q=json.loads(Path("docs/roadmap/task_queue.json").read_text())
          c=json.loads(Path("docs/roadmap/task_queue_parts/control_state.json").read_text())
          a=json.loads(Path("docs/governance/r6/operator_approval.json").read_text())
          assert q["current_task"]==task==c["current_task"]
          assert q["in_progress_tasks"]==[task]==c["in_progress_tasks"]
          assert q["next_approved_task"]==task==c["next_approved_task"]
          assert q["default_constraints"]==c["default_constraints"]
          assert q["r6_authorized_exception"]==c["r6_authorized_exception"]
          x=q["r6_authorized_exception"]
          assert x["operator_approval_phrase"]=="APPROVE R6 ONE-SHOT DEFENSIVE CANARY"
          assert x["exact_inst_id"]=="BTC-USDT-SWAP" and x["exact_action"]=="REDUCE_NEW_INVENTORY_BIAS" and x["exact_parameter"]=="new_inventory_bias"
          assert x["maximum_absolute_delta"]==0.05 and x["max_symbols"]==x["max_action_count"]==1
          assert x["runtime_mutation_allowed"] is True and x["live_apply_authorized"] is True
          assert x["execution_allowed"] is False and x["order_action_allowed"] is False and x["auto_loop"] is False
          assert a["decision"]=="APPROVED" and a["approval_record_id"]==x["approval_record_id"]
          for key in ("runtime_mutation_allowed","live_apply_authorized","execution_allowed"):
              assert q["default_constraints"][key] is False
          source=Path("adaptive_defense/r6_one_shot_defensive_canary.py").read_text()
          route=Path("api/routes_defensive_effective.py").read_text()
          runner=Path("tools/run_defensive_effective_r6_one_shot_canary.ps1").read_text()
          web=Path("web_app.py").read_text()
          for token in ("requests.","httpx.","socket.","place_order(","cancel_order(","amend_order(","move_order(","clear_inventory"):
              assert token not in source
          assert "Depends(require_admin_token)" in route
          assert "defensive_effective_router" in web
          assert "while (" not in runner and "foreach (" not in runner and "Start-Sleep" not in runner
          assert 'CANARY_VALUE = -0.05' in source and 'BASELINE_VALUE = 0.0' in source
          assert '"orders_modified": False' in source and '"automatic_relock_completed": True' in source
          PY
          rc=$?
          cat ../r6_boundary.log
          exit $rc

      - id: persist
        if: always()
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          BOUNDARY_OUTCOME: ${{ steps.boundary.outcome }}
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"
          python - <<'PY'
          import json, os
          from pathlib import Path
          outcomes={"manifest":os.environ.get("MANIFEST_OUTCOME","unknown"),"private_checkout":os.environ.get("CHECKOUT_OUTCOME","unknown"),"tests":os.environ.get("TESTS_OUTCOME","unknown"),"boundary":os.environ.get("BOUNDARY_OUTCOME","unknown")}
          def tail(name):
              path=Path(name)
              return path.read_text(errors="replace")[-6000:] if path.exists() else ""
          status="PASS" if all(value=="success" for value in outcomes.values()) else "FAIL"
          result={"schema_version":"defensive_effective_r6_public_ci_result_v1","task_id":"DefensiveEffective-R6_OperatorApprovedOneShotDefensiveParameterCanary","status":status,"immutable_private_candidate":"0795327809ac66f3a5dda0c96716a96788c3ea93","private_pr":114,"step_outcomes":outcomes,"tests_diagnostic_tail":tail("r6_tests.log"),"boundary_diagnostic_tail":tail("r6_boundary.log"),"r6_focused_test_count":13,"approval_binding":"PASS" if outcomes["tests"]=="success" else "FAIL","cas_replay_restore_relock":"PASS" if outcomes["tests"]=="success" else "FAIL","order_actions":False,"automatic_loop":False,"current_process_execution_performed":False,"runtime_evidence_required":True}
          path=Path("governance/validation/results/defensive_effective_r6_result.json")
          path.parent.mkdir(parents=True,exist_ok=True)
          path.write_text(json.dumps(result,indent=2,sort_keys=True)+"\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/defensive_effective_r6_result.json
          git commit -m "ci: record R6 one-shot canary validation" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          result=json.loads(Path("governance/validation/results/defensive_effective_r6_result.json").read_text())
          assert result["status"]=="PASS", result["step_outcomes"]
          PY
