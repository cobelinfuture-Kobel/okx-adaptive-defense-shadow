name: Defensive Effective R5 Public CI

on:
  push:
    branches: ["validation/r5-*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-r5:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRIVATE_CANDIDATE_SHA: 1cdbe0e48da7efedb999dcb8d3e0f953618fe983
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: true

      - id: manifest
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path("governance/validation/defensive_effective_r5_candidate.json").read_text())
          assert d["private_candidate_sha"]=="1cdbe0e48da7efedb999dcb8d3e0f953618fe983"
          assert d["private_pr"]==111 and d["expected_r5_test_count"]==12
          assert d["exact_inst_id"]=="BTC-USDT-SWAP"
          assert d["exact_action"]=="REDUCE_NEW_INVENTORY_BIAS"
          assert d["exact_parameter"]=="new_inventory_bias"
          assert not any(d[k] for k in ("new_route","new_runtime_publisher","new_service","new_executor","runtime_access","runtime_mutation","live_activation","execution","order_actions"))
          assert d["overall_progress"]==64 and d["distance_to_goal"]==36
          assert d["effective_readiness"]=="NOT_READY"
          PY

      - id: private_checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - id: tests
        if: steps.private_checkout.outcome == 'success'
        continue-on-error: true
        working-directory: _private
        run: |
          set +e
          (
            set -e
            python -m pip install --disable-pip-version-check -q pytest
            python -m py_compile adaptive_defense/r5_human_approval_canary_binding.py tests/test_r5_human_approval_canary_binding.py
            R5_COUNT=$(python -m pytest --collect-only -q tests/test_r5_human_approval_canary_binding.py | grep -c '::test_')
            echo "R5_COUNT=$R5_COUNT"
            test "$R5_COUNT" -eq 12
            python -m pytest -q tests/test_r5_human_approval_canary_binding.py
          ) > ../r5_tests.log 2>&1
          rc=$?
          cat ../r5_tests.log
          exit $rc

      - id: boundary
        if: steps.private_checkout.outcome == 'success'
        continue-on-error: true
        working-directory: _private
        run: |
          set +e
          python - <<'PY' > ../r5_boundary.log 2>&1
          import json
          from pathlib import Path
          task="DefensiveEffective-R5_ExplicitHumanApprovalAndOneShotCanaryAuthorizationBinding_FullFix"
          q=json.loads(Path("docs/roadmap/task_queue.json").read_text())
          c=json.loads(Path("docs/roadmap/task_queue_parts/control_state.json").read_text())
          p=json.loads(Path("docs/governance/r5/latest.json").read_text())
          assert q["current_task"]==task==c["current_task"]
          assert q["in_progress_tasks"]==[task]==c["in_progress_tasks"]
          assert q["next_approved_task"]==task==c["next_approved_task"]
          assert q["default_constraints"]==c["default_constraints"]
          assert p["status"]=="FULLFIX_IMPLEMENTED_LOCAL_PASS_PUBLIC_CI_PENDING"
          assert p["mainline"]["overall_progress"]==64 and p["mainline"]["distance_to_goal"]==36
          for key,value in {"shadow_only":True,"effective":False,"execution_allowed":False,"runtime_access_allowed":False,"runtime_mutation_allowed":False,"live_apply_authorized":False}.items():
              assert q["default_constraints"][key] is value
          source=Path("adaptive_defense/r5_human_approval_canary_binding.py").read_text()
          for token in ("requests.","httpx.","subprocess.","socket.","place_order(","cancel_order(","amend_order(","apply_parameter("):
              assert token not in source
          for token in ('"live_apply_authorized": False','"runtime_mutation_allowed": False','"execution_allowed": False','"automatic_approval_allowed": False'):
              assert token in source
          assert '"APPROVED", "REJECTED", "EXPIRED", "REVOKED"' in source
          PY
          rc=$?
          cat ../r5_boundary.log
          exit $rc

      - id: persist
        if: always()
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          BOUNDARY_OUTCOME: ${{ steps.boundary.outcome }}
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"
          python - <<'PY'
          import json, os
          from pathlib import Path
          outcomes={"manifest":os.environ.get("MANIFEST_OUTCOME","unknown"),"private_checkout":os.environ.get("CHECKOUT_OUTCOME","unknown"),"tests":os.environ.get("TESTS_OUTCOME","unknown"),"boundary":os.environ.get("BOUNDARY_OUTCOME","unknown")}
          def tail(name):
              path=Path(name)
              return path.read_text(errors="replace")[-6000:] if path.exists() else ""
          status="PASS" if all(value=="success" for value in outcomes.values()) else "FAIL"
          result={"schema_version":"defensive_effective_r5_public_ci_result_v2","task_id":"DefensiveEffective-R5_ExplicitHumanApprovalAndOneShotCanaryAuthorizationBinding_FullFix","status":status,"immutable_private_candidate":"1cdbe0e48da7efedb999dcb8d3e0f953618fe983","private_pr":111,"step_outcomes":outcomes,"tests_diagnostic_tail":tail("r5_tests.log"),"boundary_diagnostic_tail":tail("r5_boundary.log"),"r5_focused_test_count":12,"repository_authority_connection":"PASS" if outcomes["tests"]=="success" else "FAIL","runtime_access":False,"runtime_mutation":False,"live_activation":False,"execution":False,"order_actions":False,"overall_progress":64,"distance_to_goal":36,"effective_readiness":"NOT_READY"}
          path=Path("governance/validation/results/defensive_effective_r5_result.json")
          path.parent.mkdir(parents=True,exist_ok=True)
          path.write_text(json.dumps(result,indent=2,sort_keys=True)+"\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/defensive_effective_r5_result.json
          git commit -m "ci: record R5 approval binding validation" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          result=json.loads(Path("governance/validation/results/defensive_effective_r5_result.json").read_text())
          assert result["status"]=="PASS", result["step_outcomes"]
          PY
