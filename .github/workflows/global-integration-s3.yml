name: Defensive Effective R1D Public CI

on:
  push:
    branches: ["defensive-effective/r1d-*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-r1d:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRIVATE_CANDIDATE_SHA: 667aa157261143eebfda7abc1e9bdbeba5ce43e5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Validate manifest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path("governance/validation/defensive_effective_r1d_candidate.json").read_text())
          assert d["private_candidate_sha"]=="667aa157261143eebfda7abc1e9bdbeba5ce43e5"
          assert d["private_pr"]==98
          assert d["validation_scope"]=="existing_runner_parameter_surface_mode"
          assert d["runtime_proof"]=="NOT_CLAIMED_PENDING_FRESH_PROCESS_GET"
          assert d["effective_readiness"]=="NOT_READY"
          assert not any(d[k] for k in ("new_production_module","new_runner","production_process_replacement","runtime_parameter_mutation","live_apply","execution","order_actions"))
          PY

      - name: Checkout immutable Private candidate
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Compile and run focused regressions
        working-directory: _private
        run: |
          python -m py_compile adaptive_defense/r1_runtime_readback.py tests/test_r1_runtime_readback.py tests/test_s3_authoritative_publisher_prime.py
          python - <<'PY'
          import runpy
          total=0
          for p in ("tests/test_r1_runtime_readback.py","tests/test_s3_authoritative_publisher_prime.py"):
              ns=runpy.run_path(p)
              tests=sorted((n,f) for n,f in ns.items() if n.startswith("test_") and callable(f))
              assert tests
              for n,f in tests:
                  f()
                  total+=1
                  print(f"PASS {p}::{n}")
          print(f"FOCUSED_TEST_COUNT={total}")
          PY

      - name: Validate existing-runner safety
        working-directory: _private
        run: |
          python - <<'PY'
          from pathlib import Path
          runner=Path("tools/run_global_integration_s3_getonlyqa.ps1").read_text()
          test=Path("tests/test_s3_authoritative_publisher_prime.py").read_text()
          for token in ('[ValidateSet("MISSING", "PRESENT")]', '$ExpectedParameterSurface = "MISSING"', 'R1D_SIGNAL_SAFETY_PARAMETER_FRESH_PROCESS_GET_ONLY_QA_PASS_PRODUCTION_UNCHANGED', 'SIGNAL_SAFETY_AND_PARAMETER_READBACK_PROVEN', 'PRESENT_NEUTRAL_SHADOW_READONLY', 'consumer_state -ne "MATCH"', 'parameter_revision', 'parameter_source_sha256', 'runtime_consumer_sha256', 'production_listener_unchanged = $productionUnchanged', 'Stop-Process -Id $canaryProcess.Id'):
              assert token in runner
          for forbidden in ("CreateEvidenceBundle","CreateFromDirectory","place_orders","cancel_all_orders","reduce_positions"):
              assert forbidden not in runner
          assert "test_existing_s3_runner_has_bounded_r1d_parameter_mode_without_new_runner" in test
          python_source=runner.split("$pythonSource = @'",1)[1].split("\n'@",1)[0]
          compile(python_source,"<r1d-existing-runner>","exec")
          assert "BackgroundRuntime" not in python_source
          assert "runtime_status.trading_enabled =" not in python_source
          PY

      - name: Persist R1D result
        if: github.event_name == 'push'
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"
          python - <<'PY'
          import json
          from pathlib import Path
          m={"schema_version":"defensive_effective_r1d_public_ci_result_v1","task_id":"DefensiveEffective-R1D_NewInventoryBiasRuntimeAuthorityAndReadback_FullFix","validation_scope":"existing_runner_parameter_surface_mode","status":"PASS","immutable_private_candidate":"667aa157261143eebfda7abc1e9bdbeba5ce43e5","private_pr":98,"compile":"PASS","focused_tests":"PASS","governance":"PASS","new_production_modules":0,"new_runners":0,"runtime_parameter_mutation":False,"live":False,"execution":False,"order_actions":False,"runtime_proof":"NOT_CLAIMED_PENDING_FRESH_PROCESS_GET","effective_readiness":"NOT_READY"}
          p=Path("governance/validation/results/defensive_effective_r1d_result.json")
          p.parent.mkdir(parents=True,exist_ok=True)
          p.write_text(json.dumps(m,indent=2,sort_keys=True)+"\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/defensive_effective_r1d_result.json
          if ! git diff --cached --quiet; then git commit -m "ci: record R1D existing-runner validation"; git push origin "HEAD:${GITHUB_REF_NAME}"; fi
