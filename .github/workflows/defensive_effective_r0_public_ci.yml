name: DefensiveEffective R0 Public CI

on:
  push:
    branches:
      - "defensive-effective/r0-public-ci-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-r0-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRIVATE_CANDIDATE_SHA: 0713b116043235aaaa6f8d740526854e8cb95c4e
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Validate manifest
        id: manifest
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('governance/validation/defensive_effective_r0_candidate.json').read_text())
          assert data['candidate'] == '0713b116043235aaaa6f8d740526854e8cb95c4e'
          assert data['private_pr'] == 73
          assert data['scope'] == 'READONLY_CURRENT_RUNTIME_READBACK_CONTRACT_DESIGNSCAN'
          assert not any(data[key] for key in ('runtime', 'live', 'execution'))
          PY

      - name: Checkout immutable Private candidate
        id: private_checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Validate frozen contract and closeout
        id: validation
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          base = Path('_private/docs/roadmap/defensive_effective/r0')
          contract = json.loads((base / 'current_runtime_readback_contract.json').read_text())
          latest = json.loads((base / 'latest.json').read_text())
          assert contract['status'] == 'FROZEN_READONLY_CONTRACT'
          assert contract['authority']['readonly_only'] is True
          assert contract['authority']['runtime_change_allowed'] is False
          assert contract['authority']['live_apply_allowed'] is False
          assert contract['sampling_contract']['snapshot_count'] == 2
          assert len(contract['required_evidence_groups']) == 5
          assert len(contract['mandatory_denials']) == 10
          assert contract['post_r0_state']['runtime_proof'] == 'NOT_CLAIMED'
          assert contract['post_r0_state']['effective_readiness'] == 'NOT_READY'
          assert latest['status'] == 'PASS_CONTRACT_FROZEN_LIVE_LOCKED'
          assert latest['findings']['current_process_identity_proof_available'] is False
          assert latest['validation']['scope_expansion'] is False
          assert latest['transition']['next_task_approved'] is False
          assert latest['safety']['runtime_access_performed'] is False
          PY

      - name: Persist R0 result marker
        if: always() && github.event_name == 'push'
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"
          python - <<'PY'
          import json, os
          from pathlib import Path
          outcomes = {
            'manifest': os.environ['MANIFEST_OUTCOME'],
            'private_checkout': os.environ['PRIVATE_CHECKOUT_OUTCOME'],
            'validation': os.environ['VALIDATION_OUTCOME'],
          }
          marker = {
            'schema_version': 'defensive_effective_r0_public_ci_result_v1',
            'task_id': 'DefensiveEffective-R0',
            'status': 'PASS' if all(v == 'success' for v in outcomes.values()) else 'FAIL',
            'immutable_private_candidate': '0713b116043235aaaa6f8d740526854e8cb95c4e',
            'step_outcomes': outcomes,
            'workflow_revision': 'DE_R0_READONLY_CONTRACT_V1',
            'runtime_proof': 'NOT_CLAIMED',
            'effective_readiness': 'NOT_READY',
            'runtime': False,
            'live': False,
            'execution': False,
          }
          path = Path('governance/validation/results/defensive_effective_r0_result.json')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(marker, indent=2, sort_keys=True) + '\n')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/defensive_effective_r0_result.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: record DefensiveEffective R0 result"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Enforce final result
        if: always()
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
        run: |
          test "$MANIFEST_OUTCOME" = success
          test "$PRIVATE_CHECKOUT_OUTCOME" = success
          test "$VALIDATION_OUTCOME" = success
