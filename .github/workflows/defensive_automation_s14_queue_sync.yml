name: DefensiveAutomation S14 Queue Sync

on:
  push:
    branches:
      - "defensive-automation/s14-public-ci-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-s14-closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: true

      - name: Verify S14 PASS marker and update bounded queue fields
        shell: python
        run: |
          import json
          from pathlib import Path
          marker = json.loads(Path("governance/validation/results/s14_result.json").read_text(encoding="utf-8"))
          assert marker["status"] == "PASS"
          assert marker["immutable_private_candidate"] == "42a69769e7c355a39a348b4fbced3f65a8155e27"
          queue_path = Path("governance/public_task_queue.json")
          queue = json.loads(queue_path.read_text(encoding="utf-8"))
          completed_marker = "DefensiveAutomation-S14_EvidenceAuditAndReconciliation_PASS"
          if completed_marker not in queue["completed_tasks"]:
              queue["completed_tasks"].append(completed_marker)
          queue["current_task"] = "DefensiveAutomation-S15_UnattendedDefensiveAutomationQA"
          queue["proposed_next_task"] = "DefensiveAutomation-S16_BoundedDefensiveAutomationV1Closeout"
          queue["last_product_task"] = {
              "task_id": "DefensiveAutomation-S14_EvidenceAuditAndReconciliation",
              "status": "PASS",
              "private_main_commit": "aaf9db81a553a397ce028d7eb895243e9d755f09",
              "validated_private_candidate": "42a69769e7c355a39a348b4fbced3f65a8155e27",
              "private_pr": 70,
              "public_validation_pr": 24,
              "public_ci_run_id": 29597771926,
              "public_ci_job_id": 87942245074,
              "public_ci_result_marker": "governance/validation/results/s14_result.json",
              "public_ci_workflow_revision": "S14_AST_SOURCE_SCAN_V1",
              "required_stage_count": 5,
              "private_public_queue_reconciliation": True,
              "cross_stage_lineage_verified": True,
              "safety_boundary_verified": True,
              "automatic_evidence_repair_allowed": False,
              "automatic_evidence_repair_performed": False,
              "runtime_access_allowed": False,
              "live_apply_authorized": False,
              "execution_allowed": False,
              "runtime_mutation_allowed": False,
          }
          queue["blocking_state"] = {
              "status": "S15_UNATTENDED_DEFENSIVE_AUTOMATION_QA_REQUIRED_LIVE_APPLY_BLOCKED",
              "task_id": "DefensiveAutomation-S15_UnattendedDefensiveAutomationQA",
              "reason": "S14 evidence reconciliation passed; bounded unattended Shadow QA remains required before V1 closeout.",
              "safe_default": "RELOCKED_SHADOW",
              "live_apply_performed": False,
          }
          queue["automation_roadmap"].update({
              "completed_tasks": 20,
              "remaining_tasks": 2,
              "current_task": "DefensiveAutomation-S15_UnattendedDefensiveAutomationQA",
          })
          assert queue["safety"]["shadow_only"] is True
          assert queue["safety"]["effective"] is False
          assert queue["safety"]["execution_allowed"] is False
          assert queue["operator_authorization"]["live_apply_authorized"] is False
          queue_path.write_text(json.dumps(queue, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

      - name: Commit queue sync when changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/public_task_queue.json
          if ! git diff --cached --quiet; then
            git commit -m "governance: sync DefensiveAutomation S14 closeout"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
