name: OKX S11 RuntimeReloadQA
on:
  push:
    branches: [main]
    paths: [".github/workflows/s11-runtime-reload-qa.yml"]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          ref: main
          path: private
          fetch-depth: 0
          persist-credentials: true
      - working-directory: private
        run: python3 -m pip install --disable-pip-version-check pytest==8.4.1
      - id: qa
        continue-on-error: true
        working-directory: private
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from adaptive_defense.five_axis_control_plan_shadow_builder import BUILDER_VERSION
          from adaptive_defense.cross_axis_authority_consolidation import consolidate_cross_axis_authority
          assert BUILDER_VERSION=="S11.CrossAxisAuthorityConsolidation.FullFix.v1"
          safe={"shadow_only":True,"effective":False,"execution_allowed":False}
          tick={"schema_version":"S6","realization_state":"READY","rounding_never_narrows":True,"source_digest":"p",**safe}
          position={"schema_version":"S7","model_state":"READY","storage_isolation_state":"ISOLATED","directional_resolution_state":"READY","source_digest":"l",**safe}
          sizing={"schema_version":"S8","resolver_state":"RESOLVED","source_digest":"s","consumer_readback":{"consumer_readback_state":"MATCH","consumer_source_digest":"s"},**safe}
          count={"schema_version":"S9","resolver_state":"RESOLVED","source_digest":"c","repair_consumer_readback":{"consumer_readback_state":"MATCH","consumer_source_digest":"c"},"replenish_consumer_readback":{"consumer_readback_state":"MATCH","consumer_source_digest":"c"},**safe}
          floor={"schema_version":"S10","service_floor_signal_state":"READY","service_floor_source_digest":"f","consumer_readback":{"consumer_readback_state":"MATCH","consumer_source_digest":"f"},**safe}
          r=consolidate_cross_axis_authority(inst_id="R",signal_snapshot_id="x",axis_snapshot_ids={"spacing":"x","position":"x","sizing":"x","order_count":"x","service_floor":"x"},tick_realization=tick,position_leg_model=position,directional_sizing=sizing,order_count_authority=count,service_floor=floor)
          assert r["cross_axis_authority_state"]=="READY"
          assert r["consolidation_mode"]=="REFERENCE_ONLY_NON_RECOMPUTING"
          assert r["consumer_readback"]["consumer_source_digest"]==r["cross_axis_source_digest"]
          assert r["shadow_only"] and not r["effective"] and not r["execution_allowed"]
          assert not r["order_mutation_allowed"]
          PY
          python3 -m pytest -q tests/test_cross_axis_authority_consolidation.py tests/test_service_floor_signal_readiness.py tests/test_order_count_authority.py tests/test_directional_sizing_authority.py tests/test_position_leg_model.py tests/test_five_axis_control_plan_shadow_builder.py
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=no)"
      - if: always()
        working-directory: private
        env:
          QA_OUTCOME: ${{ steps.qa.outcome }}
        run: |
          set -euo pipefail
          export PRIVATE_MAIN_COMMIT="$(git rev-parse HEAD)"
          git fetch origin main
          if git ls-remote --exit-code --heads origin github-actions/s11-runtime-evidence >/dev/null 2>&1; then
            git fetch origin github-actions/s11-runtime-evidence
            git switch -C github-actions/s11-runtime-evidence origin/github-actions/s11-runtime-evidence
            git merge --no-edit origin/main
          else
            git switch -c github-actions/s11-runtime-evidence origin/main
          fi
          mkdir -p docs/roadmap/five_axis/runtime_qa/s11
          python3 - <<'PY'
          import json,os
          from datetime import datetime,timezone
          from pathlib import Path
          p=os.environ["QA_OUTCOME"]=="success"
          e={"schema_version":"five_axis_runtime_reload_qa_v1","task_id":"FiveAxisAdaptiveMM-S11_CrossAxisAuthorityConsolidation_RuntimeReloadQA","status":"PASS" if p else "FAIL","private_main_commit":os.environ["PRIVATE_MAIN_COMMIT"],"fresh_process_import":"PASS" if p else "FAIL","reference_only_result":"PASS" if p else "FAIL","snapshot_coherence_result":"PASS" if p else "FAIL","consumer_readback_result":"PASS" if p else "FAIL","focused_tests_result":"PASS" if p else "FAIL","shadow_only":True,"effective":False,"execution_allowed":False,"okx_api_accessed":False,"orders_modified":False,"workflow_run_id":os.environ["GITHUB_RUN_ID"],"workflow_run_url":f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{os.environ["GITHUB_RUN_ID"]}',"verified_at":datetime.now(timezone.utc).isoformat()}
          Path("docs/roadmap/five_axis/runtime_qa/s11/latest.json").write_text(json.dumps(e,indent=2,sort_keys=True)+"\n",encoding="utf-8")
          PY
          git add docs/roadmap/five_axis/runtime_qa/s11/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "qa: record S11 RuntimeReloadQA ${GITHUB_RUN_ID}"
          git push origin HEAD:github-actions/s11-runtime-evidence
      - if: steps.qa.outcome != 'success'
        run: exit 1
