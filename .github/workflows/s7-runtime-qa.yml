name: OKX S7 RuntimeQA

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/s7-runtime-qa.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime:
    name: S7 Position Leg RuntimeQA
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout merged Private main
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          ref: main
          path: private
          fetch-depth: 0
          persist-credentials: true
      - name: Install pinned test runner
        working-directory: private
        run: python3 -m pip install --disable-pip-version-check pytest==8.4.1
      - name: Fresh-process S7 readback
        id: qa
        continue-on-error: true
        working-directory: private
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from adaptive_defense.five_axis_control_plan_shadow_builder import BUILDER_VERSION
          from adaptive_defense.position_leg_model import build_position_leg_model
          assert BUILDER_VERSION == "S7.PositionLegModelAndStorageIsolation.FullFix.v1"
          rows = [
              {"instId":"RUNTIME","position_mode":"LONG_SHORT","position_side":"long","position_size":7,"position_notional":700},
              {"instId":"RUNTIME","position_mode":"LONG_SHORT","position_side":"short","position_size":5,"position_notional":500},
          ]
          result = build_position_leg_model(
              inst_id="RUNTIME",
              position_rows=rows,
              default_position_mode="LONG_SHORT",
              pending_buy_quote_notional=200,
              pending_sell_quote_notional=300,
          )
          assert result["model_state"] == "READY"
          assert result["storage_isolation_state"] == "ISOLATED"
          assert result["long_leg"]["position_contracts"] == 7
          assert result["short_leg"]["position_contracts"] == 5
          assert result["buy_effect_by_leg"]["SHORT"] == "SHORT_REDUCING"
          assert result["sell_effect_by_leg"]["LONG"] == "LONG_REDUCING"
          assert result["shadow_only"] is True
          assert result["effective"] is False
          assert result["execution_allowed"] is False
          print("S7_RUNTIME_IMPORT_PASS")
          PY
          python3 -m pytest -q \
            tests/test_spacing_unit_normalization.py \
            tests/test_spacing_multiplier_arbitration.py \
            tests/test_tick_rounded_spacing_realization.py \
            tests/test_position_leg_model.py \
            tests/test_five_axis_control_plan_shadow_builder.py
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=no)"
      - name: Write isolated runtime evidence
        if: always()
        working-directory: private
        env:
          QA_OUTCOME: ${{ steps.qa.outcome }}
        run: |
          set -euo pipefail
          export PRIVATE_MAIN_COMMIT="$(git rev-parse HEAD)"
          git fetch origin main
          if git ls-remote --exit-code --heads origin github-actions/s7-runtime-evidence >/dev/null 2>&1; then
            git fetch origin github-actions/s7-runtime-evidence
            git switch -C github-actions/s7-runtime-evidence origin/github-actions/s7-runtime-evidence
            git merge --no-edit origin/main
          else
            git switch -c github-actions/s7-runtime-evidence origin/main
          fi
          mkdir -p docs/roadmap/five_axis/runtime_qa/s7
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          passed = os.environ["QA_OUTCOME"] == "success"
          evidence = {
              "schema_version": "five_axis_runtime_qa_v1",
              "task_id": "FiveAxisAdaptiveMM-S7_PositionLegModelAndStorageIsolation_RuntimeQA",
              "status": "PASS" if passed else "FAIL",
              "private_main_commit": os.environ["PRIVATE_MAIN_COMMIT"],
              "builder_version_result": "MATCH" if passed else "FAIL",
              "fresh_process_import": "PASS" if passed else "FAIL",
              "storage_isolation_result": "PASS" if passed else "FAIL",
              "focused_tests_result": "PASS" if passed else "FAIL",
              "json_csv_summary_consistency": "PASS" if passed else "FAIL",
              "shadow_only": True,
              "effective": False,
              "execution_allowed": False,
              "okx_api_accessed": False,
              "orders_modified": False,
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_url": f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{os.environ["GITHUB_RUN_ID"]}',
              "verified_at": datetime.now(timezone.utc).isoformat(),
          }
          Path("docs/roadmap/five_axis/runtime_qa/s7/latest.json").write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY
          git add docs/roadmap/five_axis/runtime_qa/s7/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "qa: record S7 RuntimeQA ${GITHUB_RUN_ID}"
          git push origin HEAD:github-actions/s7-runtime-evidence
      - name: Enforce result
        if: steps.qa.outcome != 'success'
        run: exit 1
