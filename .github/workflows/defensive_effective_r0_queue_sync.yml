name: DefensiveEffective R0 Queue Sync

on:
  push:
    branches:
      - "defensive-effective/r0-public-ci-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-r0-closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: true

      - name: Verify R0 PASS and update bounded queue fields
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          marker = json.loads(Path('governance/validation/results/defensive_effective_r0_result.json').read_text())
          assert marker['status'] == 'PASS'
          assert marker['immutable_private_candidate'] == '0713b116043235aaaa6f8d740526854e8cb95c4e'
          assert marker['workflow_revision'] == 'DE_R0_READONLY_CONTRACT_V1'
          assert all(value == 'success' for value in marker['step_outcomes'].values())

          path = Path('governance/public_task_queue.json')
          queue = json.loads(path.read_text())
          completed = 'DefensiveEffective-R0_CurrentRuntimeReadbackContract_DesignScan_PASS'
          if completed not in queue['completed_tasks']:
              queue['completed_tasks'].append(completed)
          queue['current_task'] = 'DefensiveEffective-R0_COMPLETE_LIVE_LOCKED'
          queue['proposed_next_task'] = 'DefensiveEffective-R1_CurrentRuntimeReadbackReadonlyCollector'
          queue['roadmap_status'] = 'POST_V1_EFFECTIVE_BRIDGE_R0_COMPLETE_LIVE_LOCKED'
          queue['next_approved_task'] = None
          queue['execution_policy']['auto_continue'] = False
          queue['last_product_task'] = {
              'task_id': 'DefensiveEffective-R0_CurrentRuntimeReadbackContract_DesignScan',
              'status': 'PASS_CONTRACT_FROZEN_LIVE_LOCKED',
              'private_main_commit': 'da807bb32d3e78a2dc02f91afeb80cb7a5320d4b',
              'validated_private_candidate': '0713b116043235aaaa6f8d740526854e8cb95c4e',
              'private_pr': 73,
              'public_validation_pr': 27,
              'public_ci_result_marker': 'governance/validation/results/defensive_effective_r0_result.json',
              'public_ci_workflow_revision': 'DE_R0_READONLY_CONTRACT_V1',
              'current_process_identity_proof_available': False,
              'runtime_proof': 'NOT_CLAIMED',
              'effective_readiness': 'NOT_READY',
              'runtime_access_performed': False,
              'live_apply_authorized': False,
              'execution_allowed': False,
          }
          queue['post_v1_effective_bridge'] = {
              'track_id': 'DEFENSIVE_EFFECTIVE_BRIDGE',
              'completed_tasks': 1,
              'current_state': 'R0_COMPLETE_LIVE_LOCKED',
              'proposed_next_task': 'DefensiveEffective-R1_CurrentRuntimeReadbackReadonlyCollector',
              'next_task_approved': False,
              'overall_progress_percent': 58,
              'distance_to_goal_percent': 42,
          }
          queue['blocking_state'] = {
              'status': 'R1_CURRENT_RUNTIME_READBACK_REQUIRED_LIVE_APPLY_BLOCKED',
              'task_id': 'DefensiveEffective-R1_CurrentRuntimeReadbackReadonlyCollector',
              'reason': 'R0 froze the readonly evidence contract; current process identity and parameter readback have not been collected.',
              'safe_default': 'RELOCKED_SHADOW',
              'live_apply_performed': False,
          }
          assert queue['safety']['shadow_only'] is True
          assert queue['safety']['effective'] is False
          assert queue['safety']['execution_allowed'] is False
          assert queue['operator_authorization']['live_apply_authorized'] is False
          assert queue['operator_authorization']['separate_final_action_approval_required'] is True
          path.write_text(json.dumps(queue, indent=2, ensure_ascii=False) + '\n')
          PY

      - name: Commit R0 queue state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/public_task_queue.json
          if ! git diff --cached --quiet; then
            git commit -m "governance: record DefensiveEffective R0 closeout"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
