name: Global Integration S2 Public CI

on:
  push:
    branches:
      - "global-integration/s2-public-ci-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-s2:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRIVATE_CANDIDATE_SHA: 05393d8b28553245be2f462c2a2d5a1665f44b9d
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Validate candidate manifest
        id: manifest
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("governance/validation/global_integration_s2_candidate.json").read_text())
          assert data["private_candidate_sha"] == "05393d8b28553245be2f462c2a2d5a1665f44b9d"
          assert data["private_pr"] == 87
          assert len(data["expected_features"]) == 6
          assert not any(data[key] for key in (
              "runtime_reload", "runtime_mutation", "live_apply", "execution",
              "order_actions", "deletion",
          ))
          assert data["runtime_proof"] == "NOT_CLAIMED"
          assert data["effective_readiness"] == "NOT_READY"
          PY

      - name: Checkout immutable Private candidate
        id: private_checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Compile changed Python
        id: compile
        continue-on-error: true
        working-directory: _private
        run: |
          python -m py_compile             config.py             sync_service.py             adaptive_defense/canonical_signal_eligibility.py             adaptive_defense/r1_runtime_readback.py             tests/test_canonical_signal_eligibility.py             tests/test_r1_runtime_readback.py

      - name: Run focused existing-file tests
        id: focused_tests
        continue-on-error: true
        working-directory: _private
        run: |
          python - <<'PY'
          import runpy
          for path in (
              "tests/test_canonical_signal_eligibility.py",
              "tests/test_r1_runtime_readback.py",
          ):
              namespace = runpy.run_path(path)
              tests = sorted(
                  (name, value) for name, value in namespace.items()
                  if name.startswith("test_") and callable(value)
              )
              assert tests
              for name, test in tests:
                  test()
                  print(f"PASS {path}::{name}")
          PY

      - name: Validate source and governance contract
        id: governance
        continue-on-error: true
        working-directory: _private
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          queue = json.loads(Path("docs/roadmap/task_queue.json").read_text())
          control = json.loads(Path("docs/roadmap/task_queue_parts/control_state.json").read_text())
          progress = json.loads(Path("docs/governance/s2/latest.json").read_text())
          registry = json.loads(Path("docs/governance/runtime_connectivity_registry.json").read_text())
          task = "GlobalIntegrationGovernance-S2_R1SignalSafetyExistingMainlinePublisherFullFix"
          assert queue["current_task"] == task == control["current_task"]
          assert queue["in_progress_tasks"] == [task]
          assert control["in_progress_tasks"] == [task]
          assert queue["default_constraints"]["runtime_mutation_allowed"] is False
          assert queue["default_constraints"]["live_apply_authorized"] is False
          assert progress["status"] == "IMPLEMENTED_PUBLIC_CI_PENDING_NO_RUNTIME_RELOAD"
          assert progress["scope"]["new_production_python_files"] == 0
          assert progress["scope"]["parameter_consumer_added"] is False
          assert progress["safety"]["runtime_proof"] == "NOT_CLAIMED"
          by_id = {item["capability_id"]: item for item in registry["capabilities"]}
          assert by_id["DE-R1-CANONICAL-SIGNAL-RUNTIME-PUBLISHER"]["state"] == "CONNECTED_NOT_PROVEN"
          assert by_id["DE-R1-SAFETY-CURRENT-RUNTIME-PROOF-PUBLISHER"]["state"] == "CONNECTED_NOT_PROVEN"
          source = Path("adaptive_defense/r1_runtime_readback.py").read_text()
          assert "NEW_INVENTORY_BIAS_RUNTIME_PARAMETER_NOT_INTEGRATED" in source
          assert "current_request_fail_closed_operator_safety_interlock" in source
          PY

      - name: Persist S2 result marker
        if: always() && github.event_name == 'push'
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
          FOCUSED_TESTS_OUTCOME: ${{ steps.focused_tests.outcome }}
          GOVERNANCE_OUTCOME: ${{ steps.governance.outcome }}
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"
          python - <<'PY'
          import json, os
          from pathlib import Path
          outcomes = {
              "manifest": os.environ["MANIFEST_OUTCOME"],
              "private_checkout": os.environ["PRIVATE_CHECKOUT_OUTCOME"],
              "compile": os.environ["COMPILE_OUTCOME"],
              "focused_tests": os.environ["FOCUSED_TESTS_OUTCOME"],
              "governance": os.environ["GOVERNANCE_OUTCOME"],
          }
          marker = {
              "schema_version": "global_integration_s2_public_ci_result_v1",
              "task_id": "GlobalIntegrationGovernance-S2_R1SignalSafetyExistingMainlinePublisherFullFix",
              "status": "PASS" if all(value == "success" for value in outcomes.values()) else "FAIL",
              "immutable_private_candidate": "05393d8b28553245be2f462c2a2d5a1665f44b9d",
              "step_outcomes": outcomes,
              "new_production_python_files": 0,
              "runtime_reload": False,
              "runtime_mutation": False,
              "live": False,
              "execution": False,
              "order_actions": False,
              "deletion": False,
              "runtime_proof": "NOT_CLAIMED",
              "effective_readiness": "NOT_READY",
          }
          path = Path("governance/validation/results/global_integration_s2_result.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(marker, indent=2, sort_keys=True) + "\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/global_integration_s2_result.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: record Global Integration S2 result"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Enforce final result
        if: always()
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
          FOCUSED_TESTS_OUTCOME: ${{ steps.focused_tests.outcome }}
          GOVERNANCE_OUTCOME: ${{ steps.governance.outcome }}
        run: |
          test "$MANIFEST_OUTCOME" = success
          test "$PRIVATE_CHECKOUT_OUTCOME" = success
          test "$COMPILE_OUTCOME" = success
          test "$FOCUSED_TESTS_OUTCOME" = success
          test "$GOVERNANCE_OUTCOME" = success
