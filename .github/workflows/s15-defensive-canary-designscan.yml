name: OKX S15 Defensive Parameter Canary DesignScan
on:
  push:
    branches: [main]
    paths: [".github/workflows/s15-defensive-canary-designscan.yml"]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          ref: github-actions/s15-defensive-canary-designscan
          path: private
          fetch-depth: 0
          persist-credentials: true
      - id: qa
        continue-on-error: true
        working-directory: private
        run: |
          set -euo pipefail
          git fetch origin main
          python3 - <<'PY'
          from pathlib import Path
          import subprocess
          target=Path("docs/roadmap/five_axis/s15_defensive_parameter_canary_designscan.md")
          text=target.read_text(encoding="utf-8")
          required=[
            "DESIGN READY FOR SHADOW-ONLY FULLFIX",
            "SHADOW_CANARY_PLAN_VALIDATED",
            "CANARY_DENIED_NOT_AUTHORIZED",
            "CANARY_ABORT_SERVICE_FLOOR",
            "AUDIT_READBACK_ONLY_NO_EXECUTOR",
            "effective_activation_allowed=false",
            "live_canary_activation_allowed=false",
            "authorization_granted=false",
            "shadow_only=true","effective=false","execution_allowed=false",
            "No OKX API access",
            "Public CI may validate fixtures",
          ]
          forbidden=["execution_allowed=true","effective=true","live_canary_activation_allowed=true"]
          missing=[value for value in required if value not in text]
          present=[value for value in forbidden if value in text]
          if missing or present:
              raise SystemExit(f"S15_DESIGNSCAN_CONTRACT missing={missing} forbidden={present}")
          changed=set(subprocess.check_output(
              ["git","diff","--name-only","origin/main...HEAD"],text=True,encoding="utf-8"
          ).splitlines())
          allowed={str(target),"docs/roadmap/five_axis/designscan/s15/latest.json"}
          unexpected=sorted(changed-allowed)
          if unexpected: raise SystemExit(f"S15_DESIGNSCAN_SCOPE_VIOLATION:{unexpected}")
          PY
      - if: always()
        working-directory: private
        env:
          QA_OUTCOME: ${{ steps.qa.outcome }}
        run: |
          set -euo pipefail
          export PRIVATE_HEAD_COMMIT="$(git rev-parse HEAD)"
          mkdir -p docs/roadmap/five_axis/designscan/s15
          python3 - <<'PY'
          import json,os
          from datetime import datetime,timezone
          from pathlib import Path
          passed=os.environ["QA_OUTCOME"]=="success"
          result="PASS" if passed else "FAIL"
          evidence={
            "schema_version":"five_axis_designscan_evidence_v1",
            "task_id":"FiveAxisAdaptiveMM-S15_DefensiveParameterCanary_DesignScan",
            "status":result,
            "private_head_commit":os.environ["PRIVATE_HEAD_COMMIT"],
            "contract_completeness_result":result,
            "deny_by_default_result":result,
            "offline_fixture_boundary_result":result,
            "scope_boundary_result":result,
            "authorization_granted":False,
            "shadow_only":True,
            "effective":False,
            "execution_allowed":False,
            "effective_activation_allowed":False,
            "live_canary_activation_allowed":False,
            "okx_api_accessed":False,
            "orders_modified":False,
            "workflow_run_id":os.environ["GITHUB_RUN_ID"],
            "workflow_run_url":f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{os.environ["GITHUB_RUN_ID"]}',
            "verified_at":datetime.now(timezone.utc).isoformat(),
          }
          Path("docs/roadmap/five_axis/designscan/s15/latest.json").write_text(
              json.dumps(evidence,indent=2,sort_keys=True)+"\n",encoding="utf-8"
          )
          PY
          git add docs/roadmap/five_axis/designscan/s15/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "qa: record S15 Defensive Canary DesignScan ${GITHUB_RUN_ID}"
          git push origin HEAD:github-actions/s15-defensive-canary-designscan
      - if: steps.qa.outcome != 'success'
        run: exit 1
