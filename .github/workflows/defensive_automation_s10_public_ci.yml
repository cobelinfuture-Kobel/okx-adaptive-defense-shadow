name: DefensiveAutomation S10 Public CI

on:
  push:
    branches:
      - "defensive-automation/s10-public-ci-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-s10-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PRIVATE_CANDIDATE_SHA: d426ff3b1d4f5a36b2363ec2fce3ff7c2f982800

    steps:
      - name: Checkout Public validation source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Validate candidate manifest
        id: manifest
        continue-on-error: true
        shell: python
        run: |
          import json
          from pathlib import Path
          data = json.loads(Path("governance/validation/s10_candidate.json").read_text(encoding="utf-8"))
          assert data == {
              "task": "DefensiveAutomation-S10",
              "candidate": "d426ff3b1d4f5a36b2363ec2fce3ff7c2f982800",
              "private_pr": 66,
              "approval_scope": "S10_SHADOW_CONSTRUCTION_AND_VALIDATION_ONLY",
              "live_apply_authorized": False,
              "execution_allowed": False,
          }

      - name: Checkout immutable Private candidate
        id: private_checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Provision isolated test dependencies
        id: provision
        continue-on-error: true
        working-directory: _private
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest fastapi pandas python-dotenv httpx uvicorn pyyaml requests websockets

      - name: Validate S10 source boundary
        id: source
        continue-on-error: true
        working-directory: _private
        shell: python
        run: |
          import ast
          from pathlib import Path
          path = Path("adaptive_defense/single_axis_bounded_automation.py")
          raw = path.read_text(encoding="utf-8")
          tree = ast.parse(raw)
          assignments = {}
          for node in tree.body:
              if isinstance(node, ast.Assign) and len(node.targets) == 1 and isinstance(node.targets[0], ast.Name):
                  try:
                      assignments[node.targets[0].id] = ast.literal_eval(node.value)
                  except (ValueError, TypeError):
                      pass
          assert assignments["CONTROLLER_MODE"] == "EXACT_S9_SINGLE_AXIS_BOUNDED_SHADOW_ONE_CYCLE_ONLY"
          safety = assignments["SAFETY"]
          assert safety["shadow_only"] is True
          assert safety["effective"] is False
          assert safety["execution_allowed"] is False
          assert safety["runtime_mutation_allowed"] is False
          assert safety["memory_adapter_only"] is True
          assert safety["one_cycle_only"] is True
          assert safety["auto_loop"] is False
          assert safety["live_apply_authorized"] is False
          assert safety["separate_final_action_approval_required"] is True
          for forbidden in ("requests.", "httpx.", "websockets.", "place_order", "cancel_order", "move_order"):
              assert forbidden not in raw

      - name: Run S7 through S10 focused regression
        id: tests
        continue-on-error: true
        working-directory: _private
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -m pytest -q \
            tests/test_shadow_autopilot_full_chain.py \
            tests/test_fault_injection_assisted_simulation.py \
            tests/test_lowest_risk_one_shot_policy_approval.py \
            tests/test_single_axis_bounded_automation.py \
            tests/test_limited_effective_integration.py

      - name: Verify queue remains S10 before closeout
        id: queue
        continue-on-error: true
        working-directory: _private
        shell: python
        run: |
          import json
          from pathlib import Path
          queue = json.loads(Path("docs/roadmap/task_queue.json").read_text(encoding="utf-8"))
          control = json.loads(Path("docs/roadmap/task_queue_parts/control_state.json").read_text(encoding="utf-8"))
          expected = "DefensiveAutomation-S10_SingleAxisBoundedAutomation"
          assert queue["current_task"] == control["current_task"] == expected
          for state in (queue, control):
              constraints = state["default_constraints"]
              assert constraints["shadow_only"] is True
              assert constraints["effective"] is False
              assert constraints["execution_allowed"] is False

      - name: Persist sanitized S10 result marker
        if: always() && github.event_name == 'push'
        shell: bash
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          PROVISION_OUTCOME: ${{ steps.provision.outcome }}
          SOURCE_OUTCOME: ${{ steps.source.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          QUEUE_OUTCOME: ${{ steps.queue.outcome }}
        run: |
          TARGET_BRANCH="${GITHUB_REF_NAME}"
          git pull --rebase origin "${TARGET_BRANCH}"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          outcomes = {
              "manifest": os.environ["MANIFEST_OUTCOME"],
              "private_checkout": os.environ["PRIVATE_CHECKOUT_OUTCOME"],
              "provision": os.environ["PROVISION_OUTCOME"],
              "source": os.environ["SOURCE_OUTCOME"],
              "tests": os.environ["TESTS_OUTCOME"],
              "queue": os.environ["QUEUE_OUTCOME"],
          }
          marker = {
              "schema_version": "defensive_automation_s10_public_ci_result_v1",
              "task_id": "DefensiveAutomation-S10",
              "status": "PASS" if all(value == "success" for value in outcomes.values()) else "FAIL",
              "immutable_private_candidate": "d426ff3b1d4f5a36b2363ec2fce3ff7c2f982800",
              "step_outcomes": outcomes,
              "workflow_revision": "S10_AST_SOURCE_SCAN_V1",
              "s9_exact_envelope_enforced": True,
              "memory_adapter_only": True,
              "one_cycle_only": True,
              "live_apply_authorized": False,
              "execution_allowed": False,
          }
          path = Path("governance/validation/results/s10_result.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(marker, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/s10_result.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: record DefensiveAutomation S10 result"
            git push origin "HEAD:${TARGET_BRANCH}"
          fi

      - name: Enforce final S10 result
        if: always()
        shell: bash
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          PROVISION_OUTCOME: ${{ steps.provision.outcome }}
          SOURCE_OUTCOME: ${{ steps.source.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          QUEUE_OUTCOME: ${{ steps.queue.outcome }}
        run: |
          for outcome in "$MANIFEST_OUTCOME" "$PRIVATE_CHECKOUT_OUTCOME" "$PROVISION_OUTCOME" "$SOURCE_OUTCOME" "$TESTS_OUTCOME" "$QUEUE_OUTCOME"; do
            if [ "$outcome" != "success" ]; then
              echo "DefensiveAutomation S10 immutable candidate: FAIL"
              exit 1
            fi
          done
          echo "DefensiveAutomation S10 immutable candidate: PASS"
          echo "Scope: exact S9 envelope, memory-only, one cycle"
          echo "Live apply: NOT_AUTHORIZED"
