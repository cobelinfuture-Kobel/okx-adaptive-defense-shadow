name: OKX S12 Full Chain FullFix
on:
  push:
    branches: [main]
    paths: [".github/workflows/s12-full-chain-fullfix.yml"]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          ref: github-actions/s12-full-chain-fullfix
          path: private
          fetch-depth: 0
          persist-credentials: true
      - working-directory: private
        run: python3 -m pip install --disable-pip-version-check pytest==8.4.1
      - id: qa
        continue-on-error: true
        working-directory: private
        run: |
          set -euo pipefail
          git fetch origin main
          python3 -m pytest -q \
            tests/test_spacing_unit_normalization.py \
            tests/test_spacing_multiplier_arbitration.py \
            tests/test_tick_rounded_spacing_realization.py \
            tests/test_position_leg_model.py \
            tests/test_directional_sizing_authority.py \
            tests/test_order_count_authority.py \
            tests/test_service_floor_signal_readiness.py \
            tests/test_cross_axis_authority_consolidation.py \
            tests/test_full_chain_shadow_readback.py \
            tests/test_five_axis_control_plan_shadow_builder.py
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=no)"
      - if: always()
        working-directory: private
        env:
          QA_OUTCOME: ${{ steps.qa.outcome }}
        run: |
          set -euo pipefail
          export PRIVATE_HEAD_COMMIT="$(git rev-parse HEAD)"
          mkdir -p docs/roadmap/five_axis/fullfix/s12
          python3 - <<'PY'
          import json,os
          from datetime import datetime,timezone
          from pathlib import Path
          p=os.environ["QA_OUTCOME"]=="success"
          e={"schema_version":"five_axis_fullfix_evidence_v1","task_id":"FiveAxisAdaptiveMM-S12_FullChainShadowReadback_FullFix","status":"PASS" if p else "FAIL","private_head_commit":os.environ["PRIVATE_HEAD_COMMIT"],"focused_tests_result":"PASS" if p else "FAIL","ordered_stage_result":"PASS" if p else "FAIL","digest_chain_result":"PASS" if p else "FAIL","artifact_parity_result":"PASS" if p else "FAIL","consumer_readback_result":"PASS" if p else "FAIL","shadow_only":True,"effective":False,"execution_allowed":False,"okx_api_accessed":False,"orders_modified":False,"workflow_run_id":os.environ["GITHUB_RUN_ID"],"workflow_run_url":f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{os.environ["GITHUB_RUN_ID"]}',"verified_at":datetime.now(timezone.utc).isoformat()}
          Path("docs/roadmap/five_axis/fullfix/s12/latest.json").write_text(json.dumps(e,indent=2,sort_keys=True)+"\n",encoding="utf-8")
          PY
          git add docs/roadmap/five_axis/fullfix/s12/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "qa: record S12 FullFix ${GITHUB_RUN_ID}"
          git push origin HEAD:github-actions/s12-full-chain-fullfix
      - if: steps.qa.outcome != 'success'
        run: exit 1
