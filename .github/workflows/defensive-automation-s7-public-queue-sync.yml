name: DefensiveAutomation S7 Public Queue Sync

on:
  push:
    branches:
      - "defensive-automation/s7-public-ci-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-public-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validation branch
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Verify S7 authoritative PASS marker
        shell: python
        run: |
          import json
          from pathlib import Path
          marker = json.loads(Path("governance/validation/results/defensive_automation_s7_result.json").read_text(encoding="utf-8"))
          assert marker["authority"] == "PUBLIC_GITHUB_ACTIONS"
          assert marker["status"] == "PASS"
          assert marker["workflow_revision"] == "S7_AST_SOURCE_SCAN_V3"
          assert marker["immutable_private_candidate"] == "027b0cb4928a2d7b91f22d9dd20d7ba25ffde15a"
          assert all(value == "success" for value in marker["step_outcomes"].values())

      - name: Apply bounded S7 queue patch
        shell: python
        run: |
          import json
          from pathlib import Path
          path = Path("governance/public_task_queue.json")
          queue = json.loads(path.read_text(encoding="utf-8"))
          completed = list(queue.get("completed_tasks", []))
          marker = "DefensiveAutomation-S7_ShadowAutopilotFullChain_PASS"
          if marker not in completed:
              completed.append(marker)
          queue["completed_tasks"] = completed
          queue["current_task"] = "DefensiveAutomation-S8_FaultInjectionAndAssistedSimulation"
          queue["proposed_next_task"] = "DefensiveAutomation-S9_LowestRiskOneShotBridgeAndPolicyEnvelopeApproval"
          queue["last_product_task"] = {
              "task_id": "DefensiveAutomation-S7_ShadowAutopilotFullChain",
              "status": "PASS",
              "private_main_commit": "85e27a8942034b3931cc57558554a1e38437a5b7",
              "validated_private_candidate": "027b0cb4928a2d7b91f22d9dd20d7ba25ffde15a",
              "public_ci_authority": "PUBLIC_GITHUB_ACTIONS",
              "public_ci_result_marker": "governance/validation/results/defensive_automation_s7_result.json",
              "public_ci_workflow_revision": "S7_AST_SOURCE_SCAN_V3",
              "public_ci_conclusion": "success",
              "private_pr": 63,
              "public_validation_pr": 17,
              "closed_gap": "ONE_CYCLE_SHADOW_AUTOPILOT_FULL_CHAIN",
              "one_cycle_only": True,
              "auto_loop": False,
              "memory_adapter_only": True,
              "runtime_mutation_allowed": False,
              "approval_state": "PRE_S9_NOT_APPROVED",
              "effective_activation_allowed": False,
              "live_apply_performed": False
          }
          roadmap = dict(queue.get("automation_roadmap", {}))
          roadmap["total_tasks"] = 22
          roadmap["completed_tasks"] = 13
          roadmap["remaining_tasks"] = 9
          roadmap["current_task"] = "DefensiveAutomation-S8_FaultInjectionAndAssistedSimulation"
          queue["automation_roadmap"] = roadmap
          path.write_text(json.dumps(queue, indent=2) + "\n", encoding="utf-8")

      - name: Commit queue sync when changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/public_task_queue.json
          if git diff --cached --quiet; then
            echo "Public queue already synchronized"
            exit 0
          fi
          git commit -m "ci: sync DefensiveAutomation S7 Public queue"
          git push origin "HEAD:${GITHUB_REF_NAME}"
