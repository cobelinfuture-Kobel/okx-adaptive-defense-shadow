name: DefensiveAutomation S13 Public CI

on:
  push:
    branches:
      - "defensive-automation/s13-public-ci-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-s13-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PRIVATE_CANDIDATE_SHA: 141edcf4fa9b3e8976ddfec8ed3ccf8e1ba060a8

    steps:
      - name: Checkout Public validation source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Validate candidate manifest
        id: manifest
        continue-on-error: true
        shell: python
        run: |
          import json
          from pathlib import Path
          data = json.loads(Path("governance/validation/s13_candidate.json").read_text(encoding="utf-8"))
          assert data == {
              "task": "DefensiveAutomation-S13",
              "candidate": "141edcf4fa9b3e8976ddfec8ed3ccf8e1ba060a8",
              "private_pr": 69,
              "validation_scope": "CIRCUIT_BREAKER_AUTOMATIC_SHADOW_RELOCK_MANUAL_CLEAR_ONLY",
              "automated_clear_allowed": False,
              "live_apply_authorized": False,
              "execution_allowed": False,
          }

      - name: Checkout immutable Private candidate
        id: private_checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ env.PRIVATE_CANDIDATE_SHA }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1

      - name: Provision isolated test dependencies
        id: provision
        continue-on-error: true
        working-directory: _private
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest fastapi pandas python-dotenv httpx uvicorn pyyaml requests websockets

      - name: Validate S13 source boundary
        id: source
        continue-on-error: true
        working-directory: _private
        shell: python
        run: |
          import ast
          from pathlib import Path
          path = Path("adaptive_defense/circuit_breaker_automatic_relock.py")
          raw = path.read_text(encoding="utf-8")
          tree = ast.parse(raw)
          assignments = {}
          for node in tree.body:
              if isinstance(node, ast.Assign) and len(node.targets) == 1 and isinstance(node.targets[0], ast.Name):
                  try:
                      assignments[node.targets[0].id] = ast.literal_eval(node.value)
                  except (ValueError, TypeError):
                      pass
          assert assignments["BREAKER_MODE"] == "DOMINANT_CIRCUIT_BREAKER_AUTOMATIC_SHADOW_RELOCK_MANUAL_CLEAR_ONLY"
          safety = assignments["SAFETY"]
          assert safety["shadow_only"] is True
          assert safety["effective"] is False
          assert safety["execution_allowed"] is False
          assert safety["runtime_mutation_allowed"] is False
          assert safety["contract_compilation_allowed"] is False
          assert safety["winner_execution_allowed"] is False
          assert safety["kill_switch_dominant"] is True
          assert safety["automated_clear_allowed"] is False
          assert safety["automatic_clear_performed"] is False
          assert safety["automatic_relock_to_shadow"] is True
          assert safety["manual_clear_required_after_trip"] is True
          assert safety["auto_loop"] is False
          assert safety["live_apply_authorized"] is False
          for forbidden in ("requests.", "httpx.", "websockets.", "place_order", "cancel_order", "move_order"):
              assert forbidden not in raw

      - name: Run S11 through S13 focused regression
        id: tests
        continue-on-error: true
        working-directory: _private
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -m pytest -q \
            tests/test_single_axis_observation_window.py \
            tests/test_three_axis_bounded_arbitration.py \
            tests/test_circuit_breaker_automatic_relock.py \
            tests/test_limited_effective_integration.py

      - name: Verify queue remains S13 before closeout
        id: queue
        continue-on-error: true
        working-directory: _private
        shell: python
        run: |
          import json
          from pathlib import Path
          queue = json.loads(Path("docs/roadmap/task_queue.json").read_text(encoding="utf-8"))
          control = json.loads(Path("docs/roadmap/task_queue_parts/control_state.json").read_text(encoding="utf-8"))
          expected = "DefensiveAutomation-S13_CircuitBreakerAndAutomaticRelock"
          assert queue["current_task"] == control["current_task"] == expected
          for state in (queue, control):
              constraints = state["default_constraints"]
              assert constraints["shadow_only"] is True
              assert constraints["effective"] is False
              assert constraints["execution_allowed"] is False

      - name: Persist sanitized S13 result marker
        if: always() && github.event_name == 'push'
        shell: bash
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          PROVISION_OUTCOME: ${{ steps.provision.outcome }}
          SOURCE_OUTCOME: ${{ steps.source.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          QUEUE_OUTCOME: ${{ steps.queue.outcome }}
        run: |
          TARGET_BRANCH="${GITHUB_REF_NAME}"
          git pull --rebase origin "${TARGET_BRANCH}"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          outcomes = {
              "manifest": os.environ["MANIFEST_OUTCOME"],
              "private_checkout": os.environ["PRIVATE_CHECKOUT_OUTCOME"],
              "provision": os.environ["PROVISION_OUTCOME"],
              "source": os.environ["SOURCE_OUTCOME"],
              "tests": os.environ["TESTS_OUTCOME"],
              "queue": os.environ["QUEUE_OUTCOME"],
          }
          marker = {
              "schema_version": "defensive_automation_s13_public_ci_result_v1",
              "task_id": "DefensiveAutomation-S13",
              "status": "PASS" if all(value == "success" for value in outcomes.values()) else "FAIL",
              "immutable_private_candidate": "141edcf4fa9b3e8976ddfec8ed3ccf8e1ba060a8",
              "step_outcomes": outcomes,
              "workflow_revision": "S13_AST_SOURCE_SCAN_V1",
              "kill_switch_dominant": True,
              "automatic_relock_to_shadow": True,
              "automated_clear_allowed": False,
              "live_apply_authorized": False,
              "execution_allowed": False,
          }
          path = Path("governance/validation/results/s13_result.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(marker, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/s13_result.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: record DefensiveAutomation S13 result"
            git push origin "HEAD:${TARGET_BRANCH}"
          fi

      - name: Enforce final S13 result
        if: always()
        shell: bash
        env:
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          PRIVATE_CHECKOUT_OUTCOME: ${{ steps.private_checkout.outcome }}
          PROVISION_OUTCOME: ${{ steps.provision.outcome }}
          SOURCE_OUTCOME: ${{ steps.source.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          QUEUE_OUTCOME: ${{ steps.queue.outcome }}
        run: |
          for outcome in "$MANIFEST_OUTCOME" "$PRIVATE_CHECKOUT_OUTCOME" "$PROVISION_OUTCOME" "$SOURCE_OUTCOME" "$TESTS_OUTCOME" "$QUEUE_OUTCOME"; do
            if [ "$outcome" != "success" ]; then
              echo "DefensiveAutomation S13 immutable candidate: FAIL"
              exit 1
            fi
          done
          echo "DefensiveAutomation S13 immutable candidate: PASS"
          echo "Scope: dominant circuit breaker, automatic Shadow relock, manual clear only"
          echo "Live apply: NOT_AUTHORIZED"
