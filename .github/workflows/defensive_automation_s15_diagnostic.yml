name: DefensiveAutomation S15 Diagnostic

on:
  push:
    branches:
      - "defensive-automation/s15-public-ci-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose-s15:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: true
      - uses: actions/checkout@v4
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: c27473e14416d3424617f9e9b851da7bf3539198
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: _private
          persist-credentials: false
          fetch-depth: 1
      - run: python -m pip install pytest
      - name: Capture test and campaign diagnostics
        shell: bash
        run: |
          set +e
          (cd _private && python -m pytest -q tests/test_evidence_audit_reconciliation.py tests/test_unattended_defensive_automation_qa.py) > /tmp/s15_tests.log 2>&1
          TEST_RC=$?
          (cd _private && python - <<'PY'
          import json
          from pathlib import Path
          from adaptive_defense.unattended_defensive_automation_qa import build_default_unattended_qa_scenarios, evaluate_unattended_defensive_automation_qa
          s14 = json.loads(Path("docs/roadmap/defensive_automation/s14/latest.json").read_text(encoding="utf-8"))
          result = evaluate_unattended_defensive_automation_qa(
              s14_evidence=s14,
              scenarios=build_default_unattended_qa_scenarios(s14),
          )
          print(json.dumps(result, indent=2, sort_keys=True))
          assert result["qa_state"] == "UNATTENDED_SHADOW_QA_PASS_RELOCKED", result["denial_reasons"]
          PY
          ) > /tmp/s15_campaign.log 2>&1
          CAMPAIGN_RC=$?
          export TEST_RC CAMPAIGN_RC
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          def tail(path, count=80):
              lines = Path(path).read_text(encoding="utf-8", errors="replace").splitlines()
              return lines[-count:]
          payload = {
              "schema_version": "defensive_automation_s15_diagnostic_v1",
              "candidate": "c27473e14416d3424617f9e9b851da7bf3539198",
              "test_return_code": int(os.environ["TEST_RC"]),
              "campaign_return_code": int(os.environ["CAMPAIGN_RC"]),
              "test_log_tail": tail("/tmp/s15_tests.log"),
              "campaign_log_tail": tail("/tmp/s15_campaign.log"),
          }
          path = Path("governance/validation/results/s15_diagnostic.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
      - name: Commit diagnostic
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/validation/results/s15_diagnostic.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: record S15 diagnostic"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
