name: OKX S12 RuntimeReloadQA
on:
  push:
    branches: [main]
    paths: [".github/workflows/s12-runtime-reload-qa.yml"]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          ref: main
          path: private
          fetch-depth: 0
          persist-credentials: true
      - working-directory: private
        run: python3 -m pip install --disable-pip-version-check pytest==8.4.1
      - id: qa
        continue-on-error: true
        working-directory: private
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from adaptive_defense.five_axis_control_plan_shadow_builder import BUILDER_VERSION
          from adaptive_defense.full_chain_shadow_readback import STAGE_ORDER, verify_full_chain_shadow_readback
          assert BUILDER_VERSION=="S12.FullChainShadowReadback.FullFix.v1"
          rows=[]
          previous="baseline"
          for i,name in enumerate(STAGE_ORDER):
              digest=f"d{i}"
              rows.append({"stage_name":name,"schema_version":f"V{i}","inst_id":"R","signal_snapshot_id":"signal","producer_digest":digest,"consumed_digest":previous,"ready":True,"shadow_only":True,"effective":False,"execution_allowed":False})
              previous=digest
          projection={"state":"READY","terminal":"d7"}
          r=verify_full_chain_shadow_readback(inst_id="R",baseline_snapshot_id="baseline",signal_snapshot_id="signal",stages=rows,artifact_projection={"json":projection,"item_csv":projection,"summary_csv":projection})
          assert r["full_chain_shadow_readback_state"]=="READY"
          assert r["full_chain_stage_count"]==8
          assert r["full_chain_artifact_parity_state"]=="MATCH"
          assert r["consumer_readback"]["consumer_source_digest"]==r["full_chain_terminal_digest"]
          assert r["shadow_only"] and not r["effective"] and not r["execution_allowed"]
          assert not r["order_mutation_allowed"] and not r["strategy_rotation_allowed"]
          PY
          python3 -m pytest -q tests/test_full_chain_shadow_readback.py tests/test_cross_axis_authority_consolidation.py tests/test_service_floor_signal_readiness.py tests/test_order_count_authority.py tests/test_directional_sizing_authority.py tests/test_position_leg_model.py tests/test_five_axis_control_plan_shadow_builder.py
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=no)"
      - if: always()
        working-directory: private
        env:
          QA_OUTCOME: ${{ steps.qa.outcome }}
        run: |
          set -euo pipefail
          export PRIVATE_MAIN_COMMIT="$(git rev-parse HEAD)"
          git fetch origin main
          if git ls-remote --exit-code --heads origin github-actions/s12-runtime-evidence >/dev/null 2>&1; then
            git fetch origin github-actions/s12-runtime-evidence
            git switch -C github-actions/s12-runtime-evidence origin/github-actions/s12-runtime-evidence
            git merge --no-edit origin/main
          else
            git switch -c github-actions/s12-runtime-evidence origin/main
          fi
          mkdir -p docs/roadmap/five_axis/runtime_qa/s12
          python3 - <<'PY'
          import json,os
          from datetime import datetime,timezone
          from pathlib import Path
          p=os.environ["QA_OUTCOME"]=="success"
          e={"schema_version":"five_axis_runtime_reload_qa_v1","task_id":"FiveAxisAdaptiveMM-S12_FullChainShadowReadback_RuntimeReloadQA","status":"PASS" if p else "FAIL","private_main_commit":os.environ["PRIVATE_MAIN_COMMIT"],"fresh_process_import":"PASS" if p else "FAIL","ordered_stage_result":"PASS" if p else "FAIL","digest_chain_result":"PASS" if p else "FAIL","artifact_parity_result":"PASS" if p else "FAIL","consumer_readback_result":"PASS" if p else "FAIL","focused_tests_result":"PASS" if p else "FAIL","shadow_only":True,"effective":False,"execution_allowed":False,"okx_api_accessed":False,"orders_modified":False,"workflow_run_id":os.environ["GITHUB_RUN_ID"],"workflow_run_url":f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{os.environ["GITHUB_RUN_ID"]}',"verified_at":datetime.now(timezone.utc).isoformat()}
          Path("docs/roadmap/five_axis/runtime_qa/s12/latest.json").write_text(json.dumps(e,indent=2,sort_keys=True)+"\n",encoding="utf-8")
          PY
          git add docs/roadmap/five_axis/runtime_qa/s12/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "qa: record S12 RuntimeReloadQA ${GITHUB_RUN_ID}"
          git push origin HEAD:github-actions/s12-runtime-evidence
      - if: steps.qa.outcome != 'success'
        run: exit 1
