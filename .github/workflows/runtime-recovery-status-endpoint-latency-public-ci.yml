name: RuntimeRecovery S0 Status Endpoint Public CI

on:
  workflow_dispatch:
    inputs:
      private_pr_number:
        description: Private PR number being validated
        required: true
        type: string
      candidate_sha:
        description: Immutable Private commit SHA
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-private-candidate:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout trusted Public workflow definition
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          ref: main
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install fixed test runner
        run: >-
          python -m pip install --disable-pip-version-check --quiet
          pytest==8.3.5 fastapi==0.115.6 pandas==2.2.3 python-dotenv==1.0.1
          httpx==0.28.1 websockets==14.1

      - name: Checkout immutable Private candidate read-only
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: cobelinfuture-Kobel/okx_bot_private
          ref: ${{ inputs.candidate_sha }}
          token: ${{ secrets.PRIVATE_PROMOTION_TOKEN }}
          path: private-candidate
          persist-credentials: false
          fetch-depth: 1

      - name: Validate candidate without exposing Private output
        id: validation
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: >-
          python tools/ci/validate_private_status_endpoint_candidate.py
          --candidate-root private-candidate
          --candidate-sha "$CANDIDATE_SHA"

      - name: Write sanitized CI evidence
        if: always()
        env:
          PRIVATE_PR_NUMBER: ${{ inputs.private_pr_number }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
        run: |
          {
            echo "## RuntimeRecovery S0 Public CI"
            echo
            echo "- task_id: RuntimeRecovery-S0_StatusEndpointLatency_PublicCI_Retry"
            echo "- private_pr_number: ${PRIVATE_PR_NUMBER}"
            echo "- candidate_sha: ${CANDIDATE_SHA}"
            echo "- validation_outcome: ${VALIDATION_OUTCOME}"
            echo "- shadow_only: true"
            echo "- effective: false"
            echo "- execution_allowed: false"
            echo "- public_evidence_only: true"
          } >> "$GITHUB_STEP_SUMMARY"
